<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="ko"
      th:replace="~{fragment/jobseeker_bar :: jobseeker_layout(~{::div#profileEditContent})}">

<head>
  <title>프로필 수정 | 구인구직</title>
</head>

<body>
<div id="profileEditContent">
<div class="container py-4" style="max-width: 800px;">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 font-weight-bold mb-0">프로필 수정</h1>
        <a th:href="@{/jobseeker/profile}" class="btn btn-outline-secondary">돌아가기</a>
    </div>

    <!-- 성공 메시지 -->
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${message}"></span>
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>

  
    <!-- ======= 기본 정보 수정 폼 ======= -->
    <form th:action="@{/jobseeker/profile/edit}" method="post" id="profileForm" novalidate>

        <div class="card shadow-sm mb-4">
            <div class="card-body p-4">
                <h5 class="font-weight-bold mb-4">기본 정보</h5>

                <div class="row">
                    <!-- 이름 -->
                    <div class="col-md-6 mb-3">
                        <label class="font-weight-medium">
                            이름 <span class="text-danger">*</span>
                        </label>
                        <input type="text"
                               name="name"
                               th:value="${member.name}"
                               class="form-control"
                               required
                               maxlength="16"
                               pattern="^[가-힣a-zA-Z]+$"
                               title="이름은 한글 또는 영문자만 입력 가능합니다."
                               placeholder="이름을 입력하세요">
                    </div>

                    <!-- 생년월일 -->
                    <div class="col-md-6 mb-3">
                        <label class="font-weight-medium">
                            생년월일 <span class="text-danger">*</span>
                        </label>
                        <input type="date"
                               name="birthDate"
                               th:value="${member.birthDate != null ? #temporals.format(member.birthDate, 'yyyy-MM-dd') : ''}"
                               class="form-control"
                               required>
                    </div>

                    <!-- 성별 -->
                    <div class="col-md-6 mb-3">
                        <label class="font-weight-medium">
                            성별 <span class="text-danger">*</span>
                        </label>
                        <select name="gender" class="form-control" required>
                            <option value="">선택하세요</option>
                            <option value="1" th:selected="${member.gender == 1}">남성</option>
                            <option value="2" th:selected="${member.gender == 2}">여성</option>
                        </select>
                    </div>

                    <!-- 이메일 -->
                    <div class="col-md-6 mb-3">
                        <label class="font-weight-medium">
                            이메일 <span class="text-danger">*</span>
                        </label>
                        <input type="email"
                               name="email"
                               id="email"
                               th:value="${member.email}"
                               th:data-original="${member.email}"
                               class="form-control"
                               required
                               maxlength="100"
                               title="이메일 형식이 올바르지 않습니다."
                               placeholder="이메일을 입력하세요">
                        <small id="emailMsg" class="form-text"></small>
                    </div>

                    <!-- 전화번호 -->
                    <div class="col-md-6 mb-3">
                        <label class="font-weight-medium">
                            전화번호 <span class="text-danger">*</span>
                        </label>
                        <input type="text"
                               name="phone"
                               id="phone"
                               th:value="${member.phone}"
                               class="form-control"
                               required
                               maxlength="13"
                               pattern="^01[0-9]-[0-9]{3,4}-[0-9]{4}$"
                               title="휴대폰 번호 형식이 올바르지 않습니다. (예: 010-1234-5678)"
                               placeholder="010-0000-0000">
                    </div>
                </div>
            </div>
        </div>

        <!-- 버튼 -->
        <div class="d-flex justify-content-between">
            <a th:href="@{/jobseeker/profile}" class="btn btn-outline-secondary px-4">취소</a>
            <button type="submit" class="btn btn-primary px-5">기본정보 저장</button>
        </div>
    </form>


    <!-- ======= 비밀번호 변경 폼 ======= -->
    <form th:action="@{/jobseeker/profile/password}" method="post" id="passwordForm" novalidate class="mt-4">

        <div class="card shadow-sm mb-4">
            <div class="card-body p-4">
                <h5 class="font-weight-bold mb-4">
                    <i class="fas fa-key text-muted mr-2"></i>비밀번호 변경
                </h5>

                <!-- 비밀번호 에러 메시지 -->
                <div th:if="${pwError}" class="alert alert-danger small" role="alert">
                    <i class="fas fa-exclamation-circle mr-1"></i>
                    <span th:text="${pwError}"></span>
                </div>

                <div class="row">
                    <!-- 현재 비밀번호 -->
                    <div class="col-md-12 mb-3">
                        <label class="font-weight-medium">
                            현재 비밀번호 <span class="text-danger">*</span>
                        </label>
                        <input type="password"
                               name="currentPassword"
                               id="currentPassword"
                               class="form-control"
                               required
                               autocomplete="current-password"
                               placeholder="현재 비밀번호를 입력하세요">
                    </div>

                    <!-- 새 비밀번호 -->
                    <div class="col-md-6 mb-3">
                        <label class="font-weight-medium">
                            새 비밀번호 <span class="text-danger">*</span>
                        </label>
                        <input type="password"
                               name="newPassword"
                               id="newPassword"
                               class="form-control"
                               required
                               autocomplete="new-password"
                               pattern="^(?=.*[A-Z])(?=.*[!@#$%^&amp;*()_+\-]).{8,}$"
                               title="비밀번호는 최소 8자이며, 대문자 1개 이상 + 특수문자(!@#$%^&amp;*()_+-) 1개 이상 포함해야 합니다."
                               placeholder="대문자 1개+특수문자 1개 포함, 최소 8자">
                    </div>

                    <!-- 새 비밀번호 확인 -->
                    <div class="col-md-6 mb-3">
                        <label class="font-weight-medium">
                            새 비밀번호 확인 <span class="text-danger">*</span>
                        </label>
                        <input type="password"
                               name="newPasswordConfirm"
                               id="newPasswordConfirm"
                               class="form-control"
                               required
                               autocomplete="new-password"
                               placeholder="새 비밀번호 재입력">
                        <small id="pwMatchMsg" class="form-text"></small>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-end">
            <button type="submit" class="btn btn-outline-danger px-5">비밀번호 변경</button>
        </div>
    </form>

   
    <!-- ======= 커뮤니티 인증 ======= -->
    <div class="card shadow-sm mb-4 mt-4">
        <div class="card-body p-4">
            <h5 class="font-weight-bold mb-3">
                <i class="fas fa-shield-alt text-muted mr-2"></i>커뮤니티 인증
            </h5>
            <p class="text-muted small mb-3">
                현 직장명을 인증하면 커뮤니티 게시판에서 직장명이 닉네임으로 표시됩니다.
            </p>

            <!-- 에러 메시지 -->
            <div th:if="${communityError}" class="alert alert-danger small" role="alert">
                <i class="fas fa-exclamation-circle mr-1"></i>
                <span th:text="${communityError}"></span>
            </div>

            <!-- 미인증 상태 -->
            <div th:if="${member.communityCompanyName == null or member.communityCompanyName == ''}">
                <form th:action="@{/jobseeker/profile/community}" method="post" id="communityForm">
                    <div class="d-flex align-items-end" style="gap: 10px;">
                        <div class="flex-fill">
                            <label class="font-weight-medium">직장명</label>
                            <input type="text"
                                   name="communityCompanyName"
                                   id="communityCompanyName"
                                   class="form-control"
                                   required
                                   maxlength="33"
                                   placeholder="현재 재직 중인 회사명을 입력하세요">
                        </div>
                        <button type="submit" class="btn btn-primary" style="white-space: nowrap;">인증하기</button>
                    </div>
                </form>
            </div>

            <!-- 인증 완료 상태 -->
            <div th:if="${member.communityCompanyName != null and member.communityCompanyName != ''}">
                <div class="d-flex align-items-center mb-3 p-3 rounded" style="background: #f0fdf4; border: 1px solid #bbf7d0;">
                    <i class="fas fa-check-circle text-success mr-2" style="font-size: 1.2rem;"></i>
                    <div>
                        <span class="font-weight-bold" th:text="${member.communityCompanyName}">회사명</span>
                        <small class="text-success ml-2">인증 완료</small>
                    </div>
                </div>

                <div class="d-flex" style="gap: 10px;">
                    <!-- 직장명 변경 -->
                    <form th:action="@{/jobseeker/profile/community}" method="post" id="communityChangeForm" class="d-flex flex-fill" style="gap: 10px;">
                        <input type="text"
                               name="communityCompanyName"
                               class="form-control"
                               required
                               maxlength="33"
                               placeholder="변경할 회사명을 입력하세요">
                        <button type="submit" class="btn btn-outline-primary" style="white-space: nowrap;">변경</button>
                    </form>

                    <!-- 인증 취소 -->
                    <form th:action="@{/jobseeker/profile/community/cancel}" method="post" id="communityCancelForm">
                        <button type="submit" class="btn btn-outline-secondary" style="white-space: nowrap;"
                                onclick="return confirm('커뮤니티 인증을 취소하시겠습니까?\n게시판에서 직장명이 더 이상 표시되지 않습니다.');">
                            인증 취소
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>


    <!-- ======= 대표이력서 연동 (수정 불가) ======= -->
    <div class="card shadow-sm mb-4 mt-4">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="font-weight-bold mb-0">
                    <i class="fas fa-lock text-muted mr-2"></i>대표 이력서 연동 정보
                </h5>
                <span class="badge badge-secondary">수정 불가</span>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="text-muted small mb-1">프로필 사진</label>
                    <div class="mt-1">
                        <img th:if="${resume != null and resume.photoPath != null and resume.photoPath != ''}"
                             th:src="@{/{path}(path=${resume.photoPath.substring(1)})}"
                             alt="프로필 사진"
                             class="rounded-circle"
                             style="width: 64px; height: 64px; object-fit: cover;">
                        <div th:if="${resume == null or resume.photoPath == null or resume.photoPath == ''}"
                             class="rounded-circle bg-light d-flex align-items-center justify-content-center"
                             style="width: 64px; height: 64px;">
                            <i class="fas fa-user text-muted"></i>
                        </div>
                    </div>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="text-muted small mb-1">희망 근무지역</label>
                    <p class="font-weight-medium mb-0"
                       th:text="${resume != null and resume.regionName != null ? resume.regionName : '미설정'}">-</p>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="text-muted small mb-1">희망 직무</label>
                    <p class="font-weight-medium mb-0"
                       th:text="${resume != null and resume.categoryName != null ? resume.categoryName : '미설정'}">-</p>
                </div>
            </div>

            <div class="alert alert-light border mb-0 small">
                <i class="fas fa-info-circle text-muted mr-1"></i>
                위 항목은 대표 이력서에서 수정할 수 있습니다.
                <a th:href="@{/jobseeker/resume/list}" class="ml-1">이력서 관리로 이동</a>
            </div>
        </div>
    </div>

</div>


<!-- ======= JavaScript ======= -->
<script th:inline="javascript">
document.addEventListener('DOMContentLoaded', function () {

    // ===== 이메일 중복체크 API (MemberApiController 재사용) =====
    const apiBase = /*[[@{/api/members}]]*/ '';

    // 공통 유틸 (registerMember.html 에서 가져옴)
    function setMsg(el, ok, msg) {
        if (!el) return;
        el.textContent = msg || '';
        el.classList.remove('text-success', 'text-danger', 'text-muted');
        if (!msg) return;
        el.classList.add(ok ? 'text-success' : 'text-danger');
    }

    async function checkDup(url, paramName, value) {
        const u = new URL(url, window.location.origin);
        u.searchParams.set(paramName, value);
        const res = await fetch(u.toString(), { method: 'GET' });
        if (!res.ok) throw new Error('API error');
        return await res.json();
    }

    // ===== 이메일 중복 검증 =====
    const emailInput = document.getElementById('email');
    const emailMsg = document.getElementById('emailMsg');
    const originalEmail = emailInput ? emailInput.dataset.original : '';

    async function validateEmailDup() {
        if (!emailInput) return true;

        const v = emailInput.value.trim();

        // 빈 값
        if (!v) {
            setMsg(emailMsg, false, '이메일은 필수입니다.');
            return false;
        }

        // 형식 검사
        if (!emailInput.checkValidity()) {
            setMsg(emailMsg, false, '이메일 형식이 올바르지 않습니다.');
            return false;
        }

        // 기존 이메일과 동일하면 중복 검사 불필요
        if (v === originalEmail) {
            setMsg(emailMsg, true, '');
            emailInput.dataset.available = 'true';
            return true;
        }

        // 중복 검사 (MemberApiController의 /api/members/check-email 재사용)
        try {
            setMsg(emailMsg, true, '중복 확인 중...');
            const data = await checkDup(apiBase + '/check-email', 'email', v);

            if (data.available) {
                setMsg(emailMsg, true, '사용 가능한 이메일입니다.');
                emailInput.dataset.available = 'true';
                return true;
            } else {
                setMsg(emailMsg, false, '이미 사용 중인 이메일입니다.');
                emailInput.dataset.available = 'false';
                return false;
            }
        } catch (e) {
            setMsg(emailMsg, false, '중복 확인에 실패했습니다.');
            emailInput.dataset.available = '';
            return false;
        }
    }

    if (emailInput) {
        emailInput.addEventListener('input', function () {
            emailInput.dataset.available = '';
            // 기존 이메일과 동일하면 메시지 비움
            if (emailInput.value.trim() === originalEmail) {
                setMsg(emailMsg, true, '');
            } else if (emailInput.value.trim() && !emailInput.checkValidity()) {
                setMsg(emailMsg, false, '이메일 형식이 올바르지 않습니다.');
            } else {
                setMsg(emailMsg, true, '');
            }
        });

        emailInput.addEventListener('blur', function () {
            if (emailInput.value.trim() && emailInput.value.trim() !== originalEmail) {
                validateEmailDup();
            }
        });
    }

    // ===== 휴대폰 하이픈 자동 입력 (registerMember.html 에서 가져옴) =====
    const phone = document.getElementById('phone');
    if (phone) {
        phone.addEventListener('input', function () {
            const only = phone.value.replace(/[^0-9]/g, '').slice(0, 11);
            let out = only;

            if (only.length >= 4 && only.length <= 7) {
                out = only.slice(0, 3) + '-' + only.slice(3);
            } else if (only.length >= 8) {
                out = only.slice(0, 3) + '-' + only.slice(3, 7) + '-' + only.slice(7);
            }

            phone.value = out;
        });
    }

    // ===== 비밀번호 일치 확인 (registerMember.html 에서 가져옴) =====
    const newPw = document.getElementById('newPassword');
    const newPw2 = document.getElementById('newPasswordConfirm');
    const pwMatchMsg = document.getElementById('pwMatchMsg');

    function checkPwMatch() {
        if (!newPw || !newPw2) return;

        if (newPw2.value.length === 0) {
            newPw2.setCustomValidity('');
            setMsg(pwMatchMsg, true, '');
            return;
        }

        if (newPw.value !== newPw2.value) {
            newPw2.setCustomValidity('비밀번호가 일치하지 않습니다.');
            setMsg(pwMatchMsg, false, '비밀번호가 일치하지 않습니다.');
        } else {
            newPw2.setCustomValidity('');
            setMsg(pwMatchMsg, true, '비밀번호가 일치합니다.');
        }
    }

    if (newPw && newPw2) {
        newPw.addEventListener('input', checkPwMatch);
        newPw2.addEventListener('input', checkPwMatch);
    }

    // ===== 프로필 수정 폼 제출 =====
    const profileForm = document.getElementById('profileForm');
    let profileSubmitting = false;

    if (profileForm) {
        profileForm.addEventListener('submit', async function (e) {
            if (profileSubmitting) return;
            e.preventDefault();

            // ===== 필드별 유효성 검사 =====
            const name = profileForm.querySelector('[name="name"]');
            const birthDate = profileForm.querySelector('[name="birthDate"]');
            const gender = profileForm.querySelector('[name="gender"]');
            const phoneInput = document.getElementById('phone');

            // --- 이름 ---
            if (!name.value.trim()) {
                alert('이름을 입력해주세요.');
                name.focus();
                return;
            }
            if (name.value.trim().length > 16) {
                alert('이름은 16자 이내로 입력해주세요.');
                name.focus();
                return;
            }
            if (!/^[가-힣a-zA-Z]+$/.test(name.value.trim())) {
                alert('이름은 한글 또는 영문자만 입력 가능합니다.');
                name.focus();
                return;
            }

            // --- 생년월일 ---
            if (!birthDate.value) {
                alert('생년월일을 선택해주세요.');
                birthDate.focus();
                return;
            }

            var parts = birthDate.value.split('-');
            var y = parseInt(parts[0]), m = parseInt(parts[1]), d = parseInt(parts[2]);
            var checkDate = new Date(y, m - 1, d);
            if (checkDate.getFullYear() !== y || checkDate.getMonth() !== m - 1 || checkDate.getDate() !== d) {
                alert('존재하지 않는 날짜입니다.');
                birthDate.focus();
                return;
            }

            var birth = new Date(birthDate.value);
            var today = new Date();
            today.setHours(0, 0, 0, 0);

            if (birth > today) {
                alert('생년월일은 오늘 이후 날짜를 선택할 수 없습니다.');
                birthDate.focus();
                return;
            }

            if (y < 1900) {
                alert('생년월일을 정확하게 입력해주세요.');
                birthDate.focus();
                return;
            }

            // --- 성별 ---
            if (!gender.value) {
                alert('성별을 선택해주세요.');
                gender.focus();
                return;
            }

            // --- 이메일 ---
            if (!emailInput.value.trim()) {
                alert('이메일을 입력해주세요.');
                emailInput.focus();
                return;
            }
            if (emailInput.value.trim().length > 100) {
                alert('이메일은 100자 이내로 입력해주세요.');
                emailInput.focus();
                return;
            }
            if (!emailInput.checkValidity()) {
                alert('이메일 형식이 올바르지 않습니다.');
                emailInput.focus();
                return;
            }
            var emailOk = await validateEmailDup();
            if (!emailOk) {
                emailInput.focus();
                return;
            }

            // --- 전화번호 ---
            if (!phoneInput.value.trim()) {
                alert('전화번호를 입력해주세요.');
                phoneInput.focus();
                return;
            }
            if (!/^01[0-9]-[0-9]{3,4}-[0-9]{4}$/.test(phoneInput.value)) {
                alert('전화번호 형식이 올바르지 않습니다. (예: 010-1234-5678)');
                phoneInput.focus();
                return;
            }

            profileSubmitting = true;
            profileForm.submit();
        });
    }

    // ===== 커뮤니티 인증 폼 제출 =====
    var communityForm = document.getElementById('communityForm');
    if (communityForm) {
        communityForm.addEventListener('submit', function (e) {
            var input = document.getElementById('communityCompanyName');
            if (!input.value.trim()) {
                e.preventDefault();
                alert('직장명을 입력해주세요.');
                input.focus();
                return;
            }
        });
    }

    var communityChangeForm = document.getElementById('communityChangeForm');
    if (communityChangeForm) {
        communityChangeForm.addEventListener('submit', function (e) {
            var input = communityChangeForm.querySelector('[name="communityCompanyName"]');
            if (!input.value.trim()) {
                e.preventDefault();
                alert('변경할 직장명을 입력해주세요.');
                input.focus();
                return;
            }
        });
    }

    // ===== 비밀번호 변경 폼 제출 =====
    const passwordForm = document.getElementById('passwordForm');
    let pwSubmitting = false;

    if (passwordForm) {
        passwordForm.addEventListener('submit', function (e) {
            if (pwSubmitting) return;

            // 브라우저 기본 validation
            if (!passwordForm.checkValidity()) {
                e.preventDefault();
                passwordForm.reportValidity();
                return;
            }

            // 비밀번호 일치 확인
            checkPwMatch();
            if (newPw2 && !newPw2.checkValidity()) {
                e.preventDefault();
                newPw2.reportValidity();
                return;
            }

            // 현재 비밀번호 입력 확인
            const currentPw = document.getElementById('currentPassword');
            if (currentPw && !currentPw.value.trim()) {
                e.preventDefault();
                alert('현재 비밀번호를 입력해주세요.');
                currentPw.focus();
                return;
            }

            pwSubmitting = true;
        });
    }
});
</script>
</div>
</body>
</html>
