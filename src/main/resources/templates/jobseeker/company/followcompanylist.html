<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="ko"
      th:replace="~{fragment/jobseeker_bar :: jobseeker_layout(~{::div#followCompanyContent})}">

<head>
  <title>관심 기업 | 구인구직</title>
</head>

<body>
<div id="followCompanyContent">
<div class="container-fluid px-4 py-4">

  <style>
    .fc-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px;
      transition: all 0.2s;
    }
    .fc-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }
    .fc-logo {
      width: 56px; height: 56px;
      border-radius: 12px;
      object-fit: cover;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
    }
    .fc-logo-placeholder {
      width: 56px; height: 56px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      background: #f3f4f6;
      display: flex; align-items: center; justify-content: center;
      color: #9ca3af; font-size: 22px;
    }
    .fc-name {
      font-size: 17px; font-weight: 700; color: #111827;
      margin-bottom: 2px;
    }
    .fc-industry {
      font-size: 13px; color: #6b7280;
    }
    .fc-info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #f3f4f6;
      font-size: 13.5px;
    }
    .fc-info-row:last-child { border-bottom: none; }
    .fc-info-label { color: #6b7280; }
    .fc-info-value { color: #111827; font-weight: 500; }
    .fc-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 16px; padding-top: 14px;
      border-top: 1px solid #f3f4f6;
    }
    .fc-post-count {
      font-size: 13.5px; color: #374151;
    }
    .fc-post-count strong { color: #2563eb; font-weight: 700; }
    .fc-unfollow-btn {
      font-size: 13px; color: #ef4444;
      background: none; border: 1px solid #fecaca;
      border-radius: 6px; padding: 4px 12px;
      cursor: pointer; transition: 0.2s;
    }
    .fc-unfollow-btn:hover {
      background: #fef2f2; border-color: #ef4444;
    }
    .fc-detail-btn {
      display: block; text-align: center;
      margin-top: 12px; padding: 9px 0;
      border: 1px solid #2563eb; border-radius: 8px;
      color: #2563eb; font-size: 13.5px; font-weight: 600;
      text-decoration: none; transition: 0.2s;
    }
    .fc-detail-btn:hover {
      background: #2563eb; color: #fff; text-decoration: none;
    }
    .fc-empty {
      text-align: center; padding: 60px 20px; color: #9ca3af;
    }
    .fc-empty i { font-size: 48px; margin-bottom: 16px; display: block; }
  </style>

  <!-- 타이틀 -->
  <div class="js-page-header">
    <h1 class="js-page-title">관심 기업</h1>
    <p class="js-page-subtitle">총 <strong th:text="${totalCount}">0</strong>개</p>
  </div>

  <!-- 검색 -->
  <div class="js-search-bar">
    <form th:action="@{/jobseeker/company/followcompanylist}" method="get"
          class="d-flex align-items-center" style="gap: 10px;">
      <div class="flex-fill position-relative">
        <i class="fas fa-search position-absolute text-muted"
           style="left:12px; top:50%; transform:translateY(-50%); font-size:0.85rem;"></i>
        <input type="text" name="keyword" th:value="${keyword}"
               class="form-control" style="padding-left: 36px;"
               placeholder="기업명 또는 업종으로 검색" maxlength="100">
      </div>
      <button type="submit" class="btn btn-primary" style="white-space:nowrap;">
        <i class="fas fa-search"></i> 검색
      </button>
    </form>
  </div>

  <!-- 기업 없음 -->
  <div th:if="${#lists.isEmpty(companies)}" class="fc-empty">
    <i class="fas fa-building"></i>
    <p style="font-size:16px; margin-bottom:16px;">관심 기업이 없습니다.</p>
    <a th:href="@{/companyinfo/list}" class="btn btn-primary">기업 둘러보기</a>
  </div>

  <!-- 기업 목록 -->
  <div class="row" th:unless="${#lists.isEmpty(companies)}">
    <div th:each="company : ${companies}" class="col-lg-4 col-md-6 mb-4">
      <div class="fc-card h-100">

        <!-- 상단: 로고 + 기업명 -->
        <div class="d-flex align-items-center mb-3" style="gap:14px;">
          <img th:if="${company.logoUrl != null}" th:src="@{/{path}(path=${company.logoUrl})}" th:alt="${company.companyName}" class="fc-logo">
          <div th:unless="${company.logoUrl != null}" class="fc-logo-placeholder">
            <i class="fas fa-building"></i>
          </div>
          <div>
            <div class="fc-name" th:text="${company.companyName}">기업명</div>
            <div class="fc-industry industry-code-text" th:data-code="${company.industryCode}" th:text="${company.industryCode}">업종</div>
          </div>
        </div>

        <!-- 정보 (채용정보 상세페이지 기업정보와 동일) -->
        <div>
          <div class="fc-info-row" th:if="${company.companyType != null}">
            <span class="fc-info-label">기업형태</span>
            <span class="fc-info-value" th:text="${company.companyType}">-</span>
          </div>
          <div class="fc-info-row" th:if="${company.ceoName != null}">
            <span class="fc-info-label">대표자</span>
            <span class="fc-info-value" th:text="${company.ceoName}">-</span>
          </div>
          <div class="fc-info-row" th:if="${company.industryCode != null}">
            <span class="fc-info-label">업종</span>
            <span class="fc-info-value industry-code-text" th:data-code="${company.industryCode}" th:text="${company.industryCode}">-</span>
          </div>
          <div class="fc-info-row" th:if="${company.openDate != null}">
            <span class="fc-info-label">설립일</span>
            <span class="fc-info-value" th:text="${company.openDate}">-</span>
          </div>
          <div class="fc-info-row" th:if="${company.addr1 != null}">
            <span class="fc-info-label">주소</span>
            <span class="fc-info-value" th:text="${company.addr1 + (company.addr2 != null ? ' ' + company.addr2 : '')}">-</span>
          </div>
          <div class="fc-info-row" th:if="${company.homepageUrl != null}">
            <span class="fc-info-label">홈페이지</span>
            <span class="fc-info-value">
              <a th:href="${company.homepageUrl}" target="_blank" style="color:#2563eb; font-weight:600; word-break:break-all; font-size:12.5px;">바로가기</a>
            </span>
          </div>
        </div>

        <!-- 하단: 진행중 공고 + 해제 -->
        <div class="fc-footer">
          <span class="fc-post-count">
            진행중 공고 <strong th:text="${company.activePostCount}">0</strong>건
          </span>
          <button type="button" class="fc-unfollow-btn"
                  th:data-id="${company.memberId}"
                  onclick="unfollowCompany(this.getAttribute('data-id'))">
            <i class="fas fa-heart-broken"></i> 해제
          </button>
        </div>

        <!-- 상세보기 -->
        <a th:href="@{/companyinfo/detail/{id}(id=${company.memberId})}" class="fc-detail-btn">
          <i class="fas fa-building"></i> 상세 보기
        </a>

      </div>
    </div>
  </div>

  <!-- 페이지네이션 -->
  <nav th:if="${totalPages > 1}" aria-label="페이지 이동" class="mt-4">
    <ul class="pagination justify-content-center">
      <li class="page-item" th:classappend="${currentPage == 1} ? ' disabled'">
        <a class="page-link"
           th:href="@{/jobseeker/company/followcompanylist(page=${currentPage - 1}, keyword=${keyword})}">
          <i class="fas fa-chevron-left"></i>
        </a>
      </li>
      <li th:each="p : ${#numbers.sequence(1, totalPages)}"
          class="page-item"
          th:classappend="${p == currentPage} ? ' active'">
        <a class="page-link"
           th:text="${p}"
           th:href="@{/jobseeker/company/followcompanylist(page=${p}, keyword=${keyword})}">1</a>
      </li>
      <li class="page-item" th:classappend="${currentPage == totalPages} ? ' disabled'">
        <a class="page-link"
           th:href="@{/jobseeker/company/followcompanylist(page=${currentPage + 1}, keyword=${keyword})}">
          <i class="fas fa-chevron-right"></i>
        </a>
      </li>
    </ul>
  </nav>

</div>

<script th:inline="javascript">
  /*<![CDATA[*/
  var contextPath = /*[[@{/}]]*/ '';

  // 업종코드 → 한글명 매핑 (채용정보 상세페이지와 동일)
  var industryMap = {
    'IT': 'IT·인터넷', 'SW': '소프트웨어', 'FIN': '금융·핀테크',
    'EDU': '교육·에듀테크', 'MKT': '마케팅', 'ETC': '기타'
  };
  document.querySelectorAll('.industry-code-text').forEach(function(el) {
    var code = el.getAttribute('data-code');
    el.textContent = industryMap[code] || code || '-';
  });

  function unfollowCompany(companyId) {
    if (confirm('이 기업을 관심 목록에서 제거하시겠습니까?')) {
      fetch(contextPath + 'api/follow/' + companyId + '/delete', {
        method: 'POST'
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          location.reload();
        } else {
          alert('관심 해제에 실패했습니다.');
        }
      })
      .catch(error => {
        console.error('Error:', error);
        alert('오류가 발생했습니다.');
      });
    }
  }
  /*]]>*/
</script>
</div>
</body>
</html>
