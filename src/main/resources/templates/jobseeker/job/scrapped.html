<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="ko"
      th:replace="~{fragment/jobseeker_bar :: jobseeker_layout(~{::div#scrappedContent})}">

<head>
  <title>스크랩한 공고 | 구인구직</title>
</head>

<body>
<div id="scrappedContent">
<div class="container-fluid px-4 py-4">

  <style>
    .gap-2 { gap: .5rem; }
    .hover-card { transition: box-shadow .3s; }
    .hover-card:hover { box-shadow: 0 .5rem 1rem rgba(0,0,0,.15) !important; }
    .jp-dday { font-size: 11px; font-weight: 700; border-radius: 5px; padding: 2px 7px; display: inline-block; }
    .jp-dday-urgent { background: #fef2f2; color: #dc2626; border: 1px solid #fca5a5; }
    .jp-dday-normal { background: #f0f9ff; color: #0369a1; border: 1px solid #bae6fd; }
    .jp-dday-closed { background: #f3f4f6; color: #6b7280; border: 1px solid #d1d5db; }
    .sc-applied-badge {
      display: inline-block;
      font-size: 11px; font-weight: 600;
      background: #dcfce7; color: #16a34a;
      padding: 2px 8px; border-radius: 4px;
      margin-left: 6px;
    }
    .sc-btn-unscrap {
      font-size: 12px; color: #ef4444;
      background: none; border: 1px solid #fecaca;
      border-radius: 6px; padding: 4px 10px;
      cursor: pointer; transition: 0.2s;
      white-space: nowrap;
    }
    .sc-btn-unscrap:hover { background: #fef2f2; border-color: #ef4444; }
    .sc-empty {
      text-align: center; padding: 60px 20px; color: #9ca3af;
    }
    .sc-empty i { font-size: 48px; margin-bottom: 16px; display: block; }
    /* 리스트 아이템 여백 조정 */
    .list-group-item { padding: 20px 24px; margin-bottom: 8px; border-radius: 10px !important; }
    .sc-filter-bar {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 10px;
      padding: 16px 20px; margin-bottom: 20px;
    }
  </style>

  <!-- 타이틀 -->
  <div class="js-page-header">
    <h1 class="js-page-title">스크랩한 공고</h1>
    <p class="js-page-subtitle">총 <strong th:text="${totalCount}">0</strong>개</p>
  </div>

  <!-- 검색 & 필터 -->
  <div class="js-search-bar">
    <form th:action="@{/jobseeker/job/scrapped}" method="get">
      <div class="d-flex align-items-center" style="gap: 10px;">
        <div class="flex-fill position-relative">
          <i class="fas fa-search position-absolute text-muted"
             style="left:12px; top:50%; transform:translateY(-50%); font-size:0.85rem;"></i>
          <input type="text" name="keyword" th:value="${keyword}"
                 class="form-control" style="padding-left: 36px;"
                 placeholder="직무, 회사명, 키워드로 검색" maxlength="100">
        </div>
        <button type="submit" class="btn btn-primary" style="white-space:nowrap;">
          <i class="fas fa-search"></i> 검색
        </button>
        <select name="sort" class="form-control" style="width: 120px;" onchange="this.form.submit()">
          <option value="latest"   th:selected="${sort == 'latest'}">최신순</option>
          <option value="deadline" th:selected="${sort == 'deadline'}">마감임박순</option>
        </select>
      </div>
      <div class="mt-3">
        <div class="custom-control custom-checkbox">
          <input type="checkbox" class="custom-control-input" id="hideClosed"
                 onchange="toggleClosedPosts()">
          <label class="custom-control-label" for="hideClosed">마감 공고 숨기기</label>
        </div>
      </div>
    </form>
  </div>

  <!-- 공고 없음 -->
  <div th:if="${#lists.isEmpty(scrappedPosts)}" class="sc-empty">
    <i class="fas fa-star"></i>
    <p style="font-size:16px; margin-bottom:16px;">스크랩한 공고가 없습니다.</p>
    <a th:href="@{/job/list}" class="btn btn-primary">채용공고 보러가기</a>
  </div>

  <!-- 공고 목록 (채용정보 전체공고와 동일한 list-group 형식) -->
  <div class="list-group" th:unless="${#lists.isEmpty(scrappedPosts)}">
    <div th:each="post : ${scrappedPosts}"
         class="list-group-item"
         th:classappend="${post.deleted == 1 or post.hidden == 1} ? ' sc-unavailable-item' : (${post.closed == 1} ? ' sc-closed-item' : '')"
         th:style="${post.deleted == 1 or post.hidden == 1} ? 'background-color:#f9f9f9; opacity:0.5; pointer-events:none;' : (${post.closed == 1} ? 'background-color:#f5f5f5; opacity:0.65;' : '')">

      <!-- ===== 삭제된 공고 ===== -->
      <div th:if="${post.deleted == 1}" class="d-flex justify-content-between align-items-center" style="pointer-events:auto;">
        <div>
          <h5 class="mb-1 font-weight-bold text-muted">
            <i class="fas fa-ban mr-1"></i>
            <span th:text="${post.title}">공고 제목</span>
            <span class="badge badge-dark ml-1" style="font-size:11px;">삭제된 공고</span>
          </h5>
          <p class="mb-0 text-muted small" th:text="${post.companyName}">회사명</p>
        </div>
        <button type="button" class="sc-btn-unscrap"
                th:data-id="${post.id}"
                onclick="removeScrap(event, this.getAttribute('data-id'))">
          <i class="fas fa-star"></i> 취소
        </button>
      </div>

      <!-- ===== 숨김 공고 (운영 정책에 의해 비공개) ===== -->
      <div th:if="${post.deleted != 1 and post.hidden == 1}" class="d-flex justify-content-between align-items-center" style="pointer-events:auto;">
        <div>
          <h5 class="mb-1 font-weight-bold text-muted">
            <i class="fas fa-eye-slash mr-1"></i>
            <span th:text="${post.title}">공고 제목</span>
            <span class="badge badge-secondary ml-1" style="font-size:11px;">운영 정책에 의해 비공개된 공고</span>
          </h5>
          <p class="mb-0 text-muted small" th:text="${post.companyName}">회사명</p>
        </div>
        <button type="button" class="sc-btn-unscrap"
                th:data-id="${post.id}"
                onclick="removeScrap(event, this.getAttribute('data-id'))">
          <i class="fas fa-star"></i> 취소
        </button>
      </div>

      <!-- ===== 일반 공고 (진행중/마감) ===== -->
      <div th:if="${post.deleted != 1 and post.hidden != 1}" class="d-flex justify-content-between align-items-start">
        <div class="flex-fill" style="cursor:pointer;"
             th:data-id="${post.id}"
             onclick="openDetail(this.getAttribute('data-id'))">

          <!-- 제목 + 지원완료 배지 -->
          <h5 class="mb-2 font-weight-bold">
            <span th:text="${post.title}">공고 제목</span>
            <span th:if="${post.applied == 1}" class="sc-applied-badge">지원완료</span>
          </h5>

          <!-- 회사명 -->
          <p class="mb-2 text-muted" th:text="${post.companyName}">회사명</p>

          <!-- 배지들 (채용정보 리스트와 동일) -->
          <div class="mb-2">
            <span class="badge badge-light mr-1">
              <i class="fas fa-map-marker-alt"></i>
              <span th:text="${post.parentRegion != null ? post.parentRegion + ' ' + post.region : post.region}">지역</span>
            </span>
            <span class="badge badge-light mr-1">
              <i class="fas fa-briefcase"></i>
              <span th:text="${post.categoryName}">직무</span>
            </span>
            <span class="badge badge-light mr-1">
              <i class="fas fa-user-tie"></i>
              <span th:text="${post.career == '무관' ? '경력 무관' : post.career}">경력</span>
            </span>
            <span class="badge badge-light mr-1">
              <i class="fas fa-graduation-cap"></i>
              <span th:text="${post.eduLevelName != null ? post.eduLevelName : '학력무관'}">학력</span>
            </span>
            <span class="badge badge-light mr-1" th:if="${post.workType != null}">
              <i class="fas fa-clock"></i>
              <span th:text="${post.workType}">고용형태</span>
            </span>
            <!-- 기술스택 뱃지 (최대 5개) -->
            <th:block th:if="${post.skillNames != null}" th:with="skills=${post.skillNames.split(',')}">
              <span class="badge badge-info mr-1"
                    th:each="skill, stat : ${skills}"
                    th:if="${stat.index < 5}"
                    th:text="${skill}">스킬</span>
              <span class="badge badge-secondary" th:if="${#arrays.length(skills) > 5}">
                +<span th:text="${#arrays.length(skills) - 5}">N</span>
              </span>
            </th:block>
          </div>

          <!-- 연봉 -->
          <span class="font-weight-bold small">
            <span th:if="${post.salaryNum != null and post.salaryNum > 0}"
                  th:text="'연봉 ' + ${#numbers.formatInteger(post.salaryNum, 0, 'COMMA')} + '만원'">연봉</span>
            <span th:unless="${post.salaryNum != null and post.salaryNum > 0}">회사내규 (협의)</span>
          </span>
        </div>

        <!-- 우측: D-day + 마감일 + 조회수 + 스크랩취소 -->
        <div class="text-right ml-3" style="min-width: 90px;">
          <div class="mb-1">
            <span class="jp-dday"
                  th:classappend="${post.dday == '마감'} ? 'jp-dday-closed' : (${post.dday.startsWith('D-')} ? 'jp-dday-urgent' : 'jp-dday-normal')"
                  th:text="${post.dday}">D-day</span>
          </div>
          <div class="mb-2">
            <small class="text-muted">
              <i class="far fa-clock"></i> <span th:text="${post.deadline}">2026.03.15</span>
            </small>
          </div>
          <div class="mb-2">
            <small class="text-muted"><i class="far fa-eye"></i> <span th:text="${post.viewCount}">0</span></small>
          </div>
          <button type="button" class="sc-btn-unscrap"
                  th:data-id="${post.id}"
                  onclick="removeScrap(event, this.getAttribute('data-id'))">
            <i class="fas fa-star"></i> 취소
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- 페이지네이션 -->
  <nav th:if="${totalPages > 1}" aria-label="페이지 이동" class="mt-4">
    <ul class="pagination justify-content-center">
      <li class="page-item" th:classappend="${currentPage == 1} ? ' disabled'">
        <a class="page-link"
           th:href="@{/jobseeker/job/scrapped(page=${currentPage - 1}, keyword=${keyword}, sort=${sort})}">
          <i class="fas fa-chevron-left"></i>
        </a>
      </li>
      <li th:each="p : ${#numbers.sequence(1, totalPages)}"
          class="page-item"
          th:classappend="${p == currentPage} ? ' active'">
        <a class="page-link"
           th:text="${p}"
           th:href="@{/jobseeker/job/scrapped(page=${p}, keyword=${keyword}, sort=${sort})}">1</a>
      </li>
      <li class="page-item" th:classappend="${currentPage == totalPages} ? ' disabled'">
        <a class="page-link"
           th:href="@{/jobseeker/job/scrapped(page=${currentPage + 1}, keyword=${keyword}, sort=${sort})}">
          <i class="fas fa-chevron-right"></i>
        </a>
      </li>
    </ul>
  </nav>

</div>

<script th:inline="javascript">
  /*<![CDATA[*/
  var contextPath = /*[[@{/}]]*/ '';
  if (contextPath.endsWith('/')) { contextPath = contextPath.slice(0, -1); }

  function openDetail(id) {
    window.open(contextPath + '/job/detail/' + id, '_blank');
  }

  function removeScrap(event, postId) {
    event.preventDefault();
    event.stopPropagation();
    if (confirm('스크랩을 취소하시겠습니까?')) {
      fetch(contextPath + '/api/scrap/' + postId + '/delete', {
        method: 'POST'
      })
      .then(function(response) { return response.json(); })
      .then(function(data) {
        if (data.success) {
          location.reload();
        } else {
          alert('스크랩 취소에 실패했습니다.');
        }
      })
      .catch(function(error) {
        console.error('Error:', error);
        alert('오류가 발생했습니다.');
      });
    }
  }

  function toggleClosedPosts() {
    var hideClosed = document.getElementById('hideClosed').checked;
    var items = document.querySelectorAll('.sc-closed-item');
    for (var i = 0; i < items.length; i++) {
      items[i].style.display = hideClosed ? 'none' : '';
    }
  }
  /*]]>*/
</script>
</div>
</body>
</html>
