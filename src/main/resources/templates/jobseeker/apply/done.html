<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="ko"
      th:replace="~{layout/layout_main :: layout(~{::title}, ~{::th:block[@data-slot='link']}, ~{::th:block[@data-slot='css']}, ~{::th:block[@data-slot='script']}, ~{::div#applyDoneContent})}" >

<head>
  <title>지원 완료 | 구인구직</title>

  <!-- link slot -->
  <th:block data-slot="link">
  </th:block>

  <th:block data-slot="css">
    <style>
.bg-success-light {
            background-color: #D1FAE5;
        }
    </style>
  </th:block>

  <!-- script slot -->
  <th:block data-slot="script">
    <script th:inline="javascript">
    </script>
  </th:block>
</head>

<body>
<div id="applyDoneContent">
<div class="container py-5" style="max-width: 700px;">
        <div class="card shadow-sm text-center p-5">
            <div class="bg-success-light rounded-circle d-flex align-items-center justify-content-center mx-auto mb-4"
                 style="width: 96px; height: 96px;">
                <i class="fas fa-check-circle fa-4x text-success"></i>
            </div>
            
            <h1 class="h3 font-weight-bold mb-3">지원이 완료되었습니다!</h1>
            
            <p class="text-secondary mb-4">
                지원하신 내용이 성공적으로 제출되었습니다.<br>
                기업의 검토를 기다려주세요.
            </p>
            
            <div class="alert alert-info text-left mb-4">
                <h6 class="font-weight-bold mb-3">
                    📌 다음 단계
                </h6>
                <ul class="small mb-0" style="padding-left: 1.5rem;">
                    <li class="mb-2">기업에서 이력서를 검토합니다.</li>
                    <li class="mb-2">검토 결과는 지원 내역에서 확인할 수 있습니다.</li>
                    <li>면접 제안이 있을 경우 알림을 보내드립니다.</li>
                </ul>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3 mb-md-0">
                    <a th:href="@{/jobseeker/application/list}" class="btn btn-primary btn-block py-2">
                        <i class="fas fa-list"></i> 지원 내역 보기
                    </a>
                </div>
                <div class="col-md-6">
                    <a th:href="@{/job/list}" class="btn btn-outline-secondary btn-block py-2">
                        <i class="fas fa-search"></i> 다른 공고 찾기
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
