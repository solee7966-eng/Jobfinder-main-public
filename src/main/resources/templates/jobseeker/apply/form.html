<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="ko"
      th:replace="~{layout/layout_main :: layout(~{::title}, ~{::th:block[@data-slot='link']}, ~{::th:block[@data-slot='css']}, ~{::th:block[@data-slot='script']}, ~{::div#applyFormContent})}" >

<head>
  <title>지원하기 | 구인구직</title>

  <!-- link slot -->
  <th:block data-slot="link">
  </th:block>

  <th:block data-slot="css">
    <style>
.gap-2 { gap: 0.5rem; }
        .gap-3 { gap: 1rem; }
        .bg-primary-light { background-color: #EBF5FF; }
        .bg-warning-light { background-color: #FEF3C7; }
        .hover-upload:hover {
            border-color: #007bff !important;
            background-color: #EBF5FF;
        }
        .cursor-pointer { cursor: pointer; }
        .badge-sm {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
        }
    </style>
  </th:block>

  <!-- script slot -->
  <th:block data-slot="script">
    <script th:inline="javascript">
    </script>
  </th:block>
</head>

<body>
<div id="applyFormContent">
<div class="container py-4" style="max-width: 800px;">
        <!-- 공고 요약 -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h3 class="h6 font-weight-bold mb-3">지원하려는 공고</h3>
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <h4 class="font-weight-bold text-dark" th:text="${post.title}">프론트엔드 개발자</h4>
                        <p class="text-secondary mb-0" th:text="${post.companyName}">테크기업</p>
                    </div>
                    <span class="badge badge-primary" th:text="${post.deadline}">~ 2026.03.15</span>
                </div>
            </div>
        </div>
        
        <!-- 안내 -->
        <div class="alert alert-info d-flex gap-3 mb-4">
            <i class="fas fa-info-circle mt-1"></i>
            <div class="small">
                <strong>중요:</strong> 선택한 이력서가 기업에 전달됩니다. 제출 후에는 수정할 수 없으므로 신중하게 선택해주세요.
            </div>
        </div>
        
        <form id="applyForm" 
              th:action="@{/jobseeker/apply/{postId}(postId=${post.id})}" 
              method="post" 
              enctype="multipart/form-data">
            
            <!-- 이력서 선택 -->
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h3 class="h6 font-weight-bold mb-3">
                        <i class="fas fa-file-alt"></i> 이력서 선택
                    </h3>
                    
                    <!-- 이력서가 없는 경우 -->
                    <div th:if="${#lists.isEmpty(resumes)}" class="text-center py-4">
                        <p class="text-muted">작성 완료된 이력서가 없습니다.</p>
                        <a th:href="@{/jobseeker/resume/form}" class="btn btn-outline-primary">이력서 작성하기</a>
                    </div>
                    
                    <!-- 이력서 목록 -->
                    <div th:each="resume, resumeStat : ${resumes}">
                        <label class="border rounded p-3 d-block mb-3 cursor-pointer resume-option"
                               th:classappend="${resume.isDefault} ? 'border-primary bg-primary-light' : 'border-secondary'"
                               style="cursor: pointer;">
                            <div class="d-flex align-items-start gap-3">
                                <input type="radio" 
                                       name="resumeId" 
                                       th:value="${resume.id}"
                                       th:checked="${resume.isDefault}"
                                       class="mt-1"
                                       required
                                       onchange="updateResumeSelection(this)">
                                <div class="flex-fill">
                                    <div class="d-flex align-items-center gap-2 mb-1">
                                        <h4 class="font-weight-bold mb-0" th:text="${resume.title}">경력 이력서</h4>
                                        <span class="badge badge-success badge-sm" th:if="${resume.isDefault}">대표</span>
                                    </div>
                                    <p class="small text-secondary mb-1">
                                        <span th:text="${resume.career}">경력 3년</span> · 
                                        <span th:text="${resume.role}">개발</span>
                                    </p>
                                    <p class="text-muted small mb-0">
                                        업데이트: <span th:text="${resume.updatedAt}">2026.02.10</span>
                                    </p>
                                </div>
                            </div>
                        </label>
                    </div>
                </div>
            </div>
            
            
            <!-- 첨부 파일 -->
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h3 class="h6 font-weight-bold mb-3">
                        <i class="fas fa-upload"></i> 첨부 파일
                    </h3>
                    
                    <div class="mb-3">
                        <label class="w-100 p-5 border border-dashed rounded text-center cursor-pointer hover-upload"
                               style="cursor: pointer;" id="dropZone">
                            <i class="fas fa-upload fa-2x text-secondary mb-2 d-block"></i>
                            <span class="small text-secondary">파일을 드래그하거나 클릭하여 업로드</span>
                            <input type="file" 
                                   id="fileInput"
                                   multiple 
                                   accept=".pdf,.doc,.docx,.ppt,.pptx,.zip"
                                   class="d-none"
                                   onchange="handleFileSelect(this)">
                        </label>
                        <p class="text-muted small mt-2">
                            PDF, DOC, PPT, ZIP 파일만 업로드 가능 (최대 10MB, 5개까지)
                        </p>
                    </div>
                    
                    <div id="fileList"></div>
                </div>
            </div>
            
            <!-- 동의 -->
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <div class="custom-control custom-checkbox">
                        <input type="checkbox" 
                               class="custom-control-input" 
                               id="agreeCheck"
                               name="agreed"
                               required>
                        <label class="custom-control-label" for="agreeCheck">
                            <span class="font-weight-medium">
                                개인정보 수집 및 이용에 동의합니다. <span class="text-danger">*</span>
                            </span>
                            <p class="small text-secondary mt-1 mb-0">
                                수집된 개인정보는 채용 목적으로만 사용되며, 채용 종료 후 파기됩니다.
                            </p>
                        </label>
                    </div>
                </div>
            </div>
            
            <!-- 버튼 -->
            <div class="d-flex justify-content-between">
                <a th:href="@{/job/detail/{id}(id=${post.id})}" class="btn btn-outline-secondary px-4 py-2 font-weight-medium">
                    취소
                </a>
                <button type="button" 
                        class="btn btn-primary px-5 py-2 font-weight-medium"
                        onclick="showConfirmModal()">
                    지원하기
                </button>
            </div>
        </form>
    </div>
    
    <!-- 확인 모달 -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center p-4">
                    <div class="bg-warning-light rounded-circle d-flex align-items-center justify-content-center mx-auto mb-3"
                         style="width: 64px; height: 64px;">
                        <i class="fas fa-exclamation-circle fa-2x text-warning"></i>
                    </div>
                    <h5 class="font-weight-bold mb-2">지원 확인</h5>
                    <p class="text-secondary">정말 지원하시겠습니까?</p>
                    <p class="small text-muted">제출 후에는 수정하실 수 없습니다.</p>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-outline-secondary flex-fill" data-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary flex-fill" id="submitBtn" onclick="submitForm()">지원하기</button>
                </div>
            </div>
        </div>
    </div>
    
    
    <script>
        let selectedFiles = [];
        
        // 드래그 앤 드롭 이벤트
        const dropZone = document.getElementById('dropZone');

        dropZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            e.stopPropagation();
            this.classList.add('border-primary', 'bg-primary-light');
        });

        dropZone.addEventListener('dragleave', function(e) {
            e.preventDefault();
            e.stopPropagation();
            this.classList.remove('border-primary', 'bg-primary-light');
        });

        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            e.stopPropagation();
            this.classList.remove('border-primary', 'bg-primary-light');

            const files = Array.from(e.dataTransfer.files);

            if (selectedFiles.length + files.length > 5) {
                alert('파일은 최대 5개까지 업로드 가능합니다.');
                return;
            }

            const allowedExts = ['.pdf', '.doc', '.docx', '.ppt', '.pptx', '.zip'];
            files.forEach(file => {
                const ext = '.' + file.name.split('.').pop().toLowerCase();
                if (!allowedExts.includes(ext)) {
                    alert(file.name + '은(는) 허용되지 않는 파일 형식입니다.');
                    return;
                }
                if (file.size > 10 * 1024 * 1024) {
                    alert(file.name + '은(는) 10MB를 초과하여 업로드할 수 없습니다.');
                    return;
                }
                selectedFiles.push(file);
            });

            renderFileList();
        });

        // 이력서 선택 시 스타일 변경
        function updateResumeSelection(radio) {
            document.querySelectorAll('.resume-option').forEach(label => {
                label.classList.remove('border-primary', 'bg-primary-light');
                label.classList.add('border-secondary');
            });
            radio.closest('.resume-option').classList.remove('border-secondary');
            radio.closest('.resume-option').classList.add('border-primary', 'bg-primary-light');
        }
        
        // 파일 선택
        function handleFileSelect(input) {
            const files = Array.from(input.files);
            
            if (selectedFiles.length + files.length > 5) {
                alert('파일은 최대 5개까지 업로드 가능합니다.');
                input.value = '';
                return;
            }
            
            files.forEach(file => {
                if (file.size > 10 * 1024 * 1024) {
                    alert(file.name + '은(는) 10MB를 초과하여 업로드할 수 없습니다.');
                    return;
                }
                selectedFiles.push(file);
            });
            
            renderFileList();
            input.value = '';
        }
        
        // 파일 목록 렌더링
        function renderFileList() {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '';
            
            selectedFiles.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'd-flex align-items-center justify-content-between p-3 bg-light rounded mb-2';
                fileItem.innerHTML = `
                    <div class="d-flex align-items-center gap-2">
                        <i class="fas fa-file-alt text-secondary"></i>
                        <span class="small">${file.name}</span>
                        <span class="text-muted small">(${(file.size / 1024 / 1024).toFixed(2)} MB)</span>
                    </div>
                    <button type="button" 
                            class="btn btn-sm btn-link text-danger p-0" 
                            onclick="removeFile(${index})">
                        <i class="fas fa-times"></i>
                    </button>
                `;
                fileList.appendChild(fileItem);
            });
        }
        
        // 파일 제거
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            renderFileList();
        }
        
        // 폼 유효성 검사
        function validateForm() {
            const resumeSelected = document.querySelector('input[name="resumeId"]:checked');
            if (!resumeSelected) {
                alert('이력서를 선택해주세요.');
                return false;
            }
            return true;
        }
        
        // 확인 모달 표시
        function showConfirmModal() {
            if (!validateForm()) return;
            if (!document.getElementById('agreeCheck').checked) {
                alert('개인정보 수집 및 이용에 동의해주세요.');
                return;
            }
            $('#confirmModal').modal('show');
        }
        
        // 폼 제출
        function submitForm() {
            // 중복 제출 방지
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').innerText = '처리중...';
            
            const form = document.getElementById('applyForm');
            
            // selectedFiles 를 폼의 file input에 세팅 (DataTransfer 사용)
            const dataTransfer = new DataTransfer();
            selectedFiles.forEach(file => {
                dataTransfer.items.add(file);
            });
            
            const fileInput = document.getElementById('fileInput');
            fileInput.files = dataTransfer.files;
            fileInput.name = 'files';
            
            form.submit();
        }
    </script>
</div>
</body>
</html>
