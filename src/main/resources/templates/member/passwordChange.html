<!DOCTYPE html>
<html th:replace="~{layout/layout_main :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::section})}"
      lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>비밀번호 변경 | 잡파인더</title>

  <link rel="stylesheet" th:href="@{/css/index.css}">
  <link rel="stylesheet" th:href="@{/css/member/login.css}">
  <style></style>
  <script></script>
</head>

<body>
<section class="jp-login-page">

  <section class="jp-login-hero">
    <div class="container-fluid jp-container">
      <h1 class="jp-login-hero__title">비밀번호 변경</h1>
      <div class="jp-login-hero__sub">
        보안을 위해 비밀번호를 다시 설정해 주세요.
      </div>
    </div>
  </section>

  <section class="jp-section" style="background:#fff;">
    <div class="container-fluid jp-container">
      <div class="row justify-content-center">

        <div class="col-md-8 col-lg-6 mb-3">
          <div class="jp-card jp-login-card h-100">

            <div class="jp-login-card__head">
              <div class="jp-login-card__title">비밀번호 재설정</div>
              <div class="jp-login-card__desc">
                현재 비밀번호 확인 후 새 비밀번호로 변경됩니다.
              </div>
            </div>

            <div class="jp-login-panel">

              <div class="text-danger mb-3" th:if="${error != null}">
                <span th:if="${error == 'currentPasswordInvalid'}">
                  현재 비밀번호가 올바르지 않습니다.
                </span>
                <span th:if="${error == 'newPasswordMismatch'}">
                  새 비밀번호와 확인이 일치하지 않습니다.
                </span>
              </div>

              <form th:action="@{/user-service/member/password/change}" method="post">

                <div class="form-group">
                  <label>현재 비밀번호</label>
                  <input type="password" name="currentPassword" class="form-control" required>
                </div>

                <div class="form-group mt-2">
                  <label>새 비밀번호</label>
                  <input type="password" name="newPassword" class="form-control" required>
                </div>

                <div class="form-group mt-2">
                  <label>새 비밀번호 확인</label>
                  <input type="password" name="newPasswordConfirm" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block jp-login-btn mt-3">
                  비밀번호 변경
                </button>
              </form>

              <div class="text-muted mt-3" style="font-size:13px;">
                변경 후 메인으로 이동합니다.
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>
</section>
</body>
</html>
