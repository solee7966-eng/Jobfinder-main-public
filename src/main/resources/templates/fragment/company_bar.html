
<!--/* Fragment 코드 */-->

<div xmlns:th="http://www.thymeleaf.org"
     th:fragment="company_layout(content)"
     class="company-wrapper">
     
     
  <script>
  const companyGatewayOrigin = window.location.origin;
  const companyUserServiceBase = companyGatewayOrigin + '/user-service';
  const companyBoardServiceBase = companyGatewayOrigin + '/board-service';

  function companyMoveAfterRead(event, notiId, url) {
    event.preventDefault();

    fetch(companyUserServiceBase + '/notification/api/read/' + notiId, {
      method: 'POST',
      credentials: 'include'
    })
    .catch(() => {})
    .finally(() => {
      const badge = document.getElementById("companyNotificationBadge");
      if (badge) {
        let count = parseInt(badge.innerText || "0");
        if (count > 1) {
          badge.innerText = count - 1;
        } else {
          badge.style.display = "none";
        }
      }

      if (!url || url.trim() === '') return false;

      if (url.startsWith('/board-service/')) {
        window.location.href = companyGatewayOrigin + url;
      } else if (url.startsWith('/user-service/')) {
        window.location.href = companyGatewayOrigin + url;
      } else if (url.startsWith('/community')) {
        window.location.href = companyBoardServiceBase + url;
      } else {
        window.location.href = companyUserServiceBase + url;
      }
    });

    return false;
  }
  </script>

  <!-- 상단 -->
  <header class="company-topbar">
    <div class="topbar-left">
	  <!-- 로고 클릭 시 기업 대시보드 이동 -->
	  <!-- <a th:href="@{/company/company_dashboard(menu='company_dashboard')}" class="topbar-brand"> -->
	  <a th:href="@{/company}" class="topbar-brand">
	    <span class="topbar-brand-icon">
	      <i class="fa-solid fa-magnifying-glass"></i>
	    </span>
	    <span class="topbar-brand-text">
	      <span class="logo">잡파인더</span>
	      <span class="sub">기업 서비스</span>
	    </span>
	  </a>
	
	  <!-- 메인페이지 링크 별도 -->
	  <a th:href="@{/index}" class="topbar-main-link">
	    메인페이지
	  </a>
	</div>
  
  
    <div class="topbar-right">
      
      <!-- 알림 -->
	  <div class="company-noti dropdown" th:if="${notificationList != null}">
	    <button class="company-noti-btn dropdown-toggle"
	            type="button"
	            id="companyNotificationDropdown"
	            data-toggle="dropdown"
	            aria-haspopup="true"
	            aria-expanded="false">
	  
	      <i class="fa-regular fa-bell"></i>
	  
	      <span class="company-noti-badge"
	            id="companyNotificationBadge"
	            th:if="${unreadNotificationCount > 0}"
	            th:text="${unreadNotificationCount}">
	        0
	      </span>
	    </button>
	    
	    <div class="dropdown-menu dropdown-menu-right company-noti-menu"
	         aria-labelledby="companyNotificationDropdown">
	  
	      <div class="company-noti-head">알림</div>
	  
	      <div th:if="${#lists.isEmpty(notificationList)}"
	           class="company-noti-empty">
	        알림이 없습니다.
	      </div>
	  
	      <a th:each="noti : ${notificationList}"
		     href="javascript:void(0)"
		     th:attr="data-noti-id=${noti.notiId}, data-url=${noti.linkUrl}"
		     onclick="return companyMoveAfterRead(event, this.dataset.notiId, this.dataset.url)"
		     th:class="'dropdown-item company-noti-item ' + (${noti.isRead} == 1 ? 'is-read' : '')">
		  
		    <div class="company-noti-row">
		      <div class="company-noti-title" th:text="${noti.title}">알림 제목</div>
		  
		      <span th:if="${noti.isRead == 0}"
		            class="company-noti-new">
		        NEW
		      </span>
		    </div>
		  
		    <div class="company-noti-message" th:text="${noti.message}">알림 내용</div>
		  </a>
	      
	    </div>
	  </div>
      
      <!-- 프로필 -->
      <a th:href="@{/company/profile}" class="profile profile-link">
        <div class="topbar-avatar"
             th:text="${loginCompanyInitial != null ? loginCompanyInitial : 'C'}">C</div>
        <div class="profile-meta">
          <div class="company-name"
               th:text="${loginCompanyName != null ? loginCompanyName : '기업명 미설정'}">
            기업명
          </div>
          <div class="email"
               th:text="${loginCompanyEmail != null ? loginCompanyEmail : '이메일 미등록'}">
            email@example.com
          </div>
        </div>
      </a>
	  
    </div>
    
  </header>


  <div class="company-body">

    <!-- 사이드바 -->
    <aside class="company-sidebar">
	  <ul>
	    <li th:classappend="${activeMenu}=='company_dashboard' ? ' active' : ''">
	      <a th:href="@{/company/company_dashboard(menu='company_dashboard')}">
	        <i class="fa-solid fa-chart-line"></i><span>대시보드</span>
	      </a>
	    </li>
	
	    <li th:classappend="${activeMenu}=='profile' ? ' active' : ''">
	      <a th:href="@{/company/profile(tab='basic')}">
	        <i class="fa-regular fa-building"></i><span>기업 프로필</span>
	      </a>
	    </li>
	
	    <li th:classappend="${activeMenu}=='job' ? ' active' : ''">
	      <a th:href="@{/company/job/list}">
	        <i class="fa-regular fa-file-lines"></i><span>채용 공고</span>
	      </a>
	    </li>
	
	    <li th:classappend="${activeMenu}=='applicant' ? ' active' : ''">
	      <a th:href="@{/company/applicant/list}">
	        <i class="fa-regular fa-user"></i><span>지원자 관리</span>
	      </a>
	    </li>
	
	    <li th:classappend="${activeMenu}=='offer' ? ' active' : ''">
	      <a th:href="@{/company/offer/list}">
	        <i class="fa-regular fa-envelope"></i><span>제안서 관리</span>
	      </a>
	    </li>
	
	    <li th:classappend="${activeMenu}=='banner' ? ' active' : ''">
	      <a th:href="@{/company/banner/list}">
	        <i class="fa-solid fa-bullhorn"></i><span>배너 광고</span>
	      </a>
	    </li>
	
	
	    <li th:classappend="${activeMenu}=='wallet' ? ' active' : ''">
	      <a th:href="@{/company/wallet(menu='wallet', tab='wallet')}">
	        <i class="fa-solid fa-coins"></i><span>포인트 &amp; 지갑</span>
	      </a>
	    </li>
	
	
	    <li th:classappend="${activeMenu}=='talent' ? ' active' : ''">
	      <a th:href="@{/company/talent(menu='talent')}">
	        <i class="fa-solid fa-magnifying-glass"></i><span>인재 검색</span>
	      </a>
	    </li>
	
	  </ul>
	</aside>


    <!-- 콘텐츠 -->
    <div class="company-content" th:insert="${content}"></div>

  </div>

</div>
