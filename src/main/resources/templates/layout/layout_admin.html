<!DOCTYPE html>
<html th:fragment="layout(title, link, css, script, content)"
      lang="ko"
      xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- 1. 맨 위의 layout fragment 의 title 내용으로 교체 되어짐 -->
  <title th:replace="${title}"></title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" th:href="@{/bootstrap-4.6.2-dist/css/bootstrap.min.css}">
  <!-- Font Awesome 6 Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">


  <!-- 관리자 전용 CSS -->
  <link rel="stylesheet" th:href="@{/css/admin/admin.css}">

  <!-- 2. 맨 위의 layout fragment 의 link 내용으로 교체 되어짐 -->
  <link th:replace="${link}" rel="stylesheet" href="">
  
  <!-- 3. 맨 위의 layout fragment 의 css 내용으로 교체 되어짐 -->
  <style th:replace="${css}"></style>

  
  <!-- Optional JavaScript -->
  <script th:src="@{/js/jquery-3.7.1.min.js}"></script>
  <script th:src="@{/bootstrap-4.6.2-dist/js/bootstrap.bundle.min.js}"></script>
  
  <!-- 4. 맨 위의 layout fragment 의 script 내용으로 교체 되어짐 -->
  <script th:replace="${script}" th:inline="javascript"></script>
</head>

<body>

  <!-- 관리자 레이아웃 프래그먼트 삽입 -->
  <div th:replace="fragment/admin_bar :: admin_layout(${content})"></div>

</body>
</html>
