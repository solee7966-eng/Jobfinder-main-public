<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout_company :: layout(~{::title},~{::link},~{::style},~{::script},~{::section})}">

<head>
  <title>지원자 관리</title>
  <link rel="stylesheet" th:href="@{/css/company/applicant_list.css}">
  <style type="text/css"></style>

  <script th:inline="javascript">
    const contextPath = /*[[@{/}]]*/ "";
    let currentApplicantPage = 1;

    function formatDate(dateStr) {
      if (!dateStr) return "미열람";
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;

      const y = d.getFullYear();
      const m = d.getMonth() + 1;
      const day = d.getDate();
      return `${y}. ${m}. ${day}.`;
    }

    function formatSalary(salary) {
      if (salary == null || salary === "") return "-";
      return Number(salary).toLocaleString() + "원";
    }

    
    function makeStatusOptions(selectedValue) {
   	  const current = Number(selectedValue);

   	  const list = [
   	    { value: 0, label: "미열람" },
   	    { value: 1, label: "열람" },
   	    { value: 2, label: "서류탈락" },
   	    { value: 3, label: "면접요청" },
   	    { value: 4, label: "합격" },
   	    { value: 5, label: "불합격" }
   	  ];

   	  const filteredList = (current === 0)
   	    ? list
   	    : list.filter(item => item.value !== 0);

   	  return filteredList.map(item => {
   	    return `<option value="${item.value}" ${current === item.value ? "selected" : ""}>${item.label}</option>`;
   	  }).join("");
   	}//function makeStatusOptions(selectedValue) {}
    

    async function loadApplicantList(pageNo = 1) {
      currentApplicantPage = pageNo;

      const keyword = document.getElementById("searchKeyword").value.trim();
      const processStatus = document.getElementById("processStatusFilter").value;
      const jobId = document.getElementById("jobFilter").value;

      let url = `${contextPath}company/applicant/api/list?keyword=${encodeURIComponent(keyword)}&pageNo=${pageNo}`;

      if (processStatus !== "") {
        url += `&processStatus=${encodeURIComponent(processStatus)}`;
      }
      if (jobId !== "") {
        url += `&jobId=${encodeURIComponent(jobId)}`;
      }

      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error("지원자 목록 조회 실패");

        const data = await res.json();
        const list = data.list || [];

        document.getElementById("applicantCount").textContent = data.totalCount || 0;

        const tbody = document.getElementById("applicantTbody");
        tbody.innerHTML = "";

        if (!list || list.length === 0) {
          tbody.innerHTML = `
            <tr>
              <td colspan="7" style="text-align:center; padding:40px; color:#6b7280;">
                조회된 지원자가 없습니다.
              </td>
            </tr>
          `;
          renderApplicantPagination(0, 1);
          return;
        }

        const html = list.map(item => {
          const isNew = !item.viewedAt;

          return `
            <tr>
              <td>
                <div class="ap-user">
                  <div class="ap-avatar"><i class="fa-regular fa-user"></i></div>
                  <div>
                    <div class="name">
                      ${item.name || "-"}
                      ${isNew ? '<span class="ap-new">NEW</span>' : ''}
                    </div>
                    <div class="email">${item.email || "-"}</div>
                  </div>
                </div>
              </td>
              <td><b>${item.resumeTitle || "-"}</b></td>
              <td>${item.jobTitle || "-"}</td>
              <td>${formatDate(item.appliedAt)}</td>
              <td>
                <select class="ap-status"
                        ${Number(item.processStatus) === 0 ? "disabled" : ""}
                        onchange="changeApplicantStatus(${item.applicationId}, ${item.processStatus}, this.value)">
                  ${makeStatusOptions(item.processStatus)}
                </select>
                ${Number(item.processStatus) === 0 ? '<div class="ap-status-hint">상세 확인 후 변경 가능</div>' : ''}
              </td>
              <td style="${!item.viewedAt ? 'color:#6b7280;' : ''}">
                ${item.viewedAt ? formatDate(item.viewedAt) : "미열람"}
              </td>
              <td>
                <button class="ap-btn" type="button" onclick="goApplicantDetail(${item.applicationId})">
                  <i class="fa-regular fa-pen-to-square"></i> 상세
                </button>
                  
                <button class="ap-btn" type="button" onclick="openChat(${item.applicationId})">
                  <i class="fa-solid fa-comments"></i> 채팅
                </button>
              </td>
            </tr>
          `;
        }).join("");

        tbody.innerHTML = html;
        renderApplicantPagination(data.totalPage, data.currentShowPageNo);

      } catch (e) {
        console.error(e);
        alert("지원자 목록을 불러오는 중 오류가 발생했습니다.");
      }
    }

    function renderApplicantPagination(totalPage, currentPage) {
      const paging = document.getElementById("applicantPagination");
      paging.innerHTML = "";

      if (!totalPage || totalPage <= 1) {
        return;
      }

      let html = "";

      if (currentPage > 1) {
        html += `<a href="javascript:void(0)" class="ap-page-btn" onclick="loadApplicantList(${currentPage - 1})">이전</a>`;
      } else {
        html += `<span class="ap-page-btn is-disabled">이전</span>`;
      }

      for (let i = 1; i <= totalPage; i++) {
        if (i === currentPage) {
          html += `<span class="ap-page-num active">${i}</span>`;
        } else {
          html += `<a href="javascript:void(0)" class="ap-page-num" onclick="loadApplicantList(${i})">${i}</a>`;
        }
      }

      if (currentPage < totalPage) {
        html += `<a href="javascript:void(0)" class="ap-page-btn" onclick="loadApplicantList(${currentPage + 1})">다음</a>`;
      } else {
        html += `<span class="ap-page-btn is-disabled">다음</span>`;
      }

      paging.innerHTML = html;
    }

    async function changeApplicantStatus(applicationId, prevStatus, newStatus) {
      newStatus = Number(newStatus);
      prevStatus = Number(prevStatus);

      if (Number(prevStatus) === newStatus) {
        return;
      }
      
   	  // 이미 열람 이상 상태인 지원자를 미열람으로 되돌리는 것 방지
      if (prevStatus !== 0 && newStatus === 0) {
        alert("미열람 상태로는 변경할 수 없습니다.");
        loadApplicantList(currentApplicantPage);
        return;
      }

      try {
        const res = await fetch(`${contextPath}company/applicant/api/status`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            applicationId: applicationId,
            prevStatus: prevStatus,
            newStatus: newStatus
          })
        });

        const result = await res.json();

        if (!res.ok || !result.success) {
          throw new Error(result.message || "상태 변경 실패");
        }

        alert("지원 진행상태가 변경되었습니다.");
        loadApplicantList(currentApplicantPage);

      } catch (e) {
        console.error(e);
        alert(e.message || "상태 변경 중 오류가 발생했습니다.");
        loadApplicantList(currentApplicantPage);
      }
    }

    // 상세 보기 버튼 함수
    function goApplicantDetail(applicationId) {
      location.href = `${contextPath}company/applicant/api/detail?applicationId=${applicationId}`;
    }

    window.addEventListener("DOMContentLoaded", function() {
      document.getElementById("searchKeyword").addEventListener("keyup", function(e) {
        if (e.key === "Enter") {
          loadApplicantList(1);
        }
      });

      document.getElementById("processStatusFilter").addEventListener("change", function() {
        loadApplicantList(1);
      });

      document.getElementById("jobFilter").addEventListener("change", function() {
        loadApplicantList(1);
      });

      loadApplicantList(1);
    });
    
    
    
    /* 채팅방 생성 API 호출 JS */
    async function openChat(applicationId) {
        try {
            const response = await fetch("/user-service/api/chat/rooms", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    applicationId: Number(applicationId)
                })
            });

            if (!response.ok) {
                throw new Error("채팅방 생성 또는 조회에 실패했습니다.");
            }

            const result = await response.json();

            if (result.result === "ok" && result.roomId) {
                location.href = "/user-service/chat/rooms/" + result.roomId;
                return;
            }

            alert("채팅방 이동에 실패했습니다.");
        } catch (e) {
            console.error(e);
            alert("채팅 기능 처리 중 오류가 발생했습니다.");
        }
    }
  </script>
</head>


<body>
<section class="dash">

  <div class="ap-head">
    <div>
      <h3 class="ap-title">지원자 관리</h3>
      <div class="ap-desc">지원자를 확인하고 채용 단계를 관리하세요</div>
    </div>
  </div>

  <div class="panel" style="padding:14px;">
    <div class="ap-filters">
      <div class="ap-search">
        <i class="fa-solid fa-magnifying-glass" style="color:#9ca3af;"></i>
        <input type="text" id="searchKeyword" placeholder="지원자 이름 또는 이메일로 검색...">
      </div>

      <select class="ap-select" id="processStatusFilter">
        <option value="">전체</option>
        <option value="0">미열람</option>
        <option value="1">열람</option>
        <option value="2">서류탈락</option>
        <option value="3">면접요청</option>
        <option value="4">합격</option>
        <option value="5">불합격</option>
      </select>

      <select class="ap-select" id="jobFilter">
        <option value="">전체 공고</option>
        <option th:each="job : ${jobList}"
                th:value="${job.jobId}"
                th:text="${job.title}">
          공고명
        </option>
      </select>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head">
      <h3>지원자 목록 (<span id="applicantCount">0</span>명)</h3>
    </div>

    <div class="table-responsive">
      <table class="table ap-table mb-0">
        <thead>
          <tr>
            <th style="min-width:200px;">지원자</th>
            <th style="min-width:180px;">이력서 제목</th>
            <th style="min-width:210px;">지원 공고</th>
            <th>지원일</th>
            <th style="min-width:120px;">상태</th>
            <th>열람</th>
            <th style="width:180px;">관리</th>
          </tr>
        </thead>
        <tbody id="applicantTbody"></tbody>
      </table>
    </div>

    <div class="ap-pagination-wrap">
      <div id="applicantPagination" class="ap-pagination"></div>
    </div>
  </div>

</section>
</body>
</html>
