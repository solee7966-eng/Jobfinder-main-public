<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout_admin :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::section})}">

<head>
	<meta charset="UTF-8">
	    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>채용공고 관리</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/admin/admin_job_posts.css}">
  	<style type="text/css">
   
  </style>

  <!-- th:inline="javascript" 추가 -->
  <script th:inline="javascript">

    /* contextPath 선언 */
    const contextPath = /*[[@{/}]]*/ "";

    document.addEventListener('DOMContentLoaded', function () {

      window.applyFilters = function () {
        const search = document.getElementById('searchInput').value.trim();
        const status = document.getElementById('statusFilter').value;

        const params = new URLSearchParams();
        params.set('page', '1');
        if (search) params.set('search', search);
        if (status) params.set('status', status);

        window.location.href = contextPath + 'admin/job-posts?' + params.toString();
      };

	  
	  
      /* ── 검색창 Enter 키 이벤트 ── */
      document.getElementById('searchInput').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') applyFilters();
      });

      /* ── 노출/숨김 토글 ── */
      window.toggleVisibility = function (jobId, currentHidden, currentStatus) {

        // 마감·삭제·임시저장 공고는 토글 금지
        if (currentStatus === '마감' || currentStatus === '삭제됨' || currentStatus === '임시저장' || currentStatus === '대기') return;

        const newHidden = currentHidden === 0 ? 1 : 0;

        fetch(contextPath + 'admin/job-posts/' + jobId + '/visibility', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ isHidden: newHidden })
        })
        .then(res => {
          if (res.ok) {
            location.reload();
          } else {
            showToast('노출 상태 변경 실패', 'warning');
          }
        })
        .catch(() => showToast('서버 오류 발생', 'warning'));
      };

    });

    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show ' + type;
      setTimeout(() => {
        toast.className = 'toast';
      }, 3000);
    }
  </script>
</head>

<body>

<section class="dash">
  <div class="content-container">
    <h1 class="page-title">채용공고 관리</h1>

    <!-- 통계 카드 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="label">총 공고 수</div>
        <div class="value" th:text="${totalCount}">0</div>
      </div>
      <div class="stat-card">
        <div class="label">활성 공고</div>
        <div class="value green" th:text="${activeCount}">0</div>
      </div>
	  <div class="stat-card">
	      <div class="label">대기 공고</div>
	      <div class="value" style="color:#3b82f6;" th:text="${waitingCount} ?: 0">0</div>
	  </div>  
      <div class="stat-card">
        <div class="label">숨김 공고</div>
        <div class="value yellow" th:text="${hiddenCount}">0</div>
      </div>
      <div class="stat-card">
        <div class="label">임시저장</div>
        <div class="value gray" th:text="${tempCount}">0</div>
      </div>
      <div class="stat-card">
        <div class="label">삭제 공고</div>
        <div class="value" style="color:#ef4444;" th:text="${deletedCount}">0</div>
      </div>
      <div class="stat-card">
        <div class="label">마감 공고</div>
        <div class="value" style="color:rgb(128, 0, 128);" th:text="${closedCount}">0</div>
      </div>
    </div>

    <!-- 검색 & 필터 -->
    <div class="filters">
      <input type="text" class="search-input" id="searchInput"
             placeholder="기업명 또는 공고 제목 검색..."
             th:value="${param.search != null ? param.search[0] : ''}">
      <select class="filter-select" id="statusFilter" onchange="applyFilters()">
        <option value=""        th:selected="${param.status == null or param.status == ''}">전체 상태</option>
        <option value="active"  th:selected="${param.status != null and param.status[0] == 'active'}">활성</option>
		<option value="waiting"  th:selected="${param.status != null and param.status[0] == 'waiting'}">대기</option>
		<option value="hidden"  th:selected="${param.status != null and param.status[0] == 'hidden'}">숨김</option>
        <option value="temp"    th:selected="${param.status != null and param.status[0] == 'temp'}">임시저장</option>   
        <option value="deleted" th:selected="${param.status != null and param.status[0] == 'deleted'}">삭제됨</option>
        <option value="closed"  th:selected="${param.status != null and param.status[0] == 'closed'}">마감</option>
        
      </select>
    </div>

	<p th:if="${param.status == null or (param.status[0] != 'closed' and param.status[0] != 'deleted')}"
   		style="font-size:12px; color:#9ca3af; margin-bottom:12px;">
	  📌 마감·삭제 공고는 상태 필터에서 해당 상태 선택 시 확인할 수 있습니다.
	</p>
	
    <!-- 테이블 -->
    <table class="job-table">
      <thead>
        <tr>
          <th style="width:50px;">ID</th>
          <th style="width:120px;">기업명</th>
          <th>공고 제목</th>
          <th style="width:100px;">직무</th>
          <th style="width:150px;">기술스택</th>
          <th style="width:100px;">지역</th>
          <th style="width:120px;">연봉</th>
          <th class="center" style="width:70px;">조회수</th>
          <th class="center" style="width:70px;">지원자</th>
          <th class="center" style="width:100px;">등록일</th>
          <th class="center" style="width:100px;">마감일</th>
          <th class="center" style="width:100px;">수정일</th>
          <th class="center" style="width:70px;">상태</th>
          <th class="center" style="width:100px;">표시/숨김</th>
        </tr>
      </thead>
      <tbody>
		<tr th:each="job : ${jobs}">   		
          <td th:text="${job.jobId}"></td>
          <td><span class="company-name" th:text="${job.companyName} ?: '-'"></span></td>
          <td><span class="job-title" th:text="${job.title} ?: '-'"></span></td>
          <td th:text="${job.jobCategory} ?: '-'"></td>
          <td th:text="${job.skills} ?: '-'"></td>
          <td th:text="${job.location} ?: '-'"></td>
          <td th:text="${job.salary != null} ? ${#numbers.formatInteger(job.salary, 0, 'COMMA') + '만원'} : '-'"></td>
          <td class="center" th:text="${job.viewCount} ?: '0'"></td>
          <td class="center"><span class="applicant-badge" th:text="${job.applicantCount} ?: '0'"></span></td>
          <td class="center" th:text="${job.createdAt != null} ? ${#strings.substring(job.createdAt.toString(), 0, 10)} : '-'"></td>
          <td class="center" th:text="${job.deadlineAt != null} ? ${#strings.substring(job.deadlineAt.toString(), 0, 10)} : '-'"></td>
          <td class="center" th:text="${job.updatedAt != null} ? ${#strings.substring(job.updatedAt.toString(), 0, 10)} : '-'"></td>

          <!-- 상태 배지 -->
          <td class="center">
            <span th:if="${job.status == '마감'}"
                  class="status-badge closed">마감</span>
            <span th:if="${job.status == '삭제됨'}"
                  class="status-badge" style="background:#fee2e2; color:#991b1b; font-size:10px;">삭제됨</span>
            <span th:if="${job.status == '임시저장'}"
                  class="status-badge" style="background:#ede9fe; color:#5b21b6; font-size:9px; padding: 3px 6px;">임시저장</span>
		    <span th:if="${job.status == '대기'}"
		          class="status-badge" style="background:#dbeafe; color:#1d4ed8; font-size:11px;">대기</span>
		  	<span th:if="${job.status != '마감' and job.status != '삭제됨' and job.status != '임시저장' and job.status != '대기' and job.isHidden == 0}"
		        class="status-badge active">활성</span>
		  	<span th:if="${job.status != '마감' and job.status != '삭제됨' and job.status != '임시저장' and job.status != '대기' and job.isHidden == 1}"
		        class="status-badge hidden">숨김</span>
          </td>

          <!-- 토글 (마감·삭제·임시저장이면 '-') -->
		  <td class="center">
		    <div th:if="${job.status != '마감' and job.status != '삭제됨' and job.status != '임시저장' and job.status != '대기'}"
		         class="toggle-wrapper">
		      <div class="toggle-switch"
		           th:classappend="${job.isHidden == 0} ? 'on'"
		           th:attr="onclick='toggleVisibility(' + ${job.jobId} + ', ' + ${job.isHidden} + ', \'' + ${job.status} + '\')'">
		      </div>
		      <span class="visibility-icon"
		            th:classappend="${job.isHidden == 0} ? 'visible'"
		            th:text="${job.isHidden == 0} ? '👁' : '🚫'">
		      </span>
		    </div>
		    <span th:if="${job.status == '마감' or job.status == '삭제됨' or job.status == '임시저장' or job.status == '대기'}"
		          style="color:#d1d5db; font-size:12px;">-</span>
		  </td>
        </tr>

        <tr th:if="${#lists.isEmpty(jobs)}">
          <td colspan="14" style="text-align:center; padding:40px; color:#9ca3af;">
            검색 결과가 없습니다.
          </td>
        </tr>
      </tbody>
    </table>

    <!-- 페이지바 -->
    <div class="table-footer">
      <span class="total-count">
        총 <span th:text="${filteredCount}"></span>개의 채용공고
      </span>
      <div class="pagination">
        <a th:href="@{job-posts(page=1,search=${param.search},status=${param.status})}"
           th:classappend="${currentPage == 1} ? 'disabled'">«</a>
        <a th:href="@{job-posts(page=${currentPage > 1 ? currentPage-1 : 1},search=${param.search},status=${param.status})}"
           th:classappend="${currentPage == 1} ? 'disabled'">이전</a>
        <span th:each="i : ${#numbers.sequence(1, totalPages)}">
          <a th:href="@{job-posts(page=${i},search=${param.search},status=${param.status})}"
             th:text="${i}"
             th:classappend="${i == currentPage} ? 'active'">
          </a>
        </span>
        <a th:href="@{job-posts(page=${currentPage < totalPages ? currentPage+1 : totalPages},search=${param.search},status=${param.status})}"
           th:classappend="${currentPage == totalPages} ? 'disabled'">다음</a>
        <a th:href="@{job-posts(page=${totalPages},search=${param.search},status=${param.status})}"
           th:classappend="${currentPage == totalPages} ? 'disabled'">»</a>
      </div>
    </div>

  </div>
</section>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

</body>
</html>
