<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout_admin :: layout(~{::title}, ~{::link}, ~{::style}, ~{::script}, ~{::section})}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>게시글/댓글 관리</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/admin/admin_posts.css}">
  <style type="text/css">
    
  </style>

  <script th:inline="javascript">

  const contextPath = /*[[@{/}]]*/ "";

  document.addEventListener('DOMContentLoaded', function () {

    window.switchTab = function(tab) {
      document.getElementById('postTab').style.display    = tab === 'post'    ? '' : 'none';
      document.getElementById('commentTab').style.display = tab === 'comment' ? '' : 'none';
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
    };

    window.applyFilters = function() {
      const search   = document.getElementById('searchInput').value.trim();
      const status   = document.getElementById('statusFilter').value;
      const params   = new URLSearchParams();
	  const currentTab = document.querySelector('.tab-btn.active').dataset.tab;
	  params.set('tab', currentTab);
      if (search)        params.set('search', search);
      if (status !== '') params.set('status', status);
      window.location.href = contextPath + 'admin/posts?' + params.toString();
    };

    document.getElementById('searchInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') applyFilters();
    });

    window.togglePost = function(postId, currentHidden) {
      const newHidden = currentHidden === 0 ? 1 : 0;
      fetch(contextPath + 'admin/posts/' + postId + '/visibility', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ isHidden: newHidden })
      })
      .then(res => { if (res.ok) location.reload(); else showToast('변경 실패', 'warning'); })
      .catch(() => showToast('서버 오류', 'warning'));
    };

    window.toggleComment = function(commentId, currentHidden) {
      const newHidden = currentHidden === 0 ? 1 : 0;
      fetch(contextPath + 'admin/comments/' + commentId + '/visibility', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ isHidden: newHidden })
      })
      .then(res => {
        if (res.ok) {
          const url = new URL(window.location.href);
          url.searchParams.set('tab', 'comment');
          window.location.href = url.toString();
        } else showToast('변경 실패', 'warning');
      })
      .catch(() => showToast('서버 오류', 'warning'));
    };

    const urlTab = new URLSearchParams(window.location.search).get('tab');
    if (urlTab === 'comment') switchTab('comment');

  });

  function showToast(message, type) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast show ' + type;
    setTimeout(() => { toast.className = 'toast'; }, 3000);
  }
  </script>
</head>

<body>
<section class="dash" th:fragment="section">
  <div class="content-container">
    <h1 class="page-title">게시글 / 댓글 관리</h1>

    <!-- 1. 탭 -->
    <div class="tab-wrapper">
      <button class="tab-btn active" data-tab="post"    onclick="switchTab('post')">📝 게시글</button>
      <button class="tab-btn"        data-tab="comment" onclick="switchTab('comment')">💬 댓글</button>
    </div>

    <!-- 2. 검색창 (탭 밖 공통) -->
    <div class="filters">
      <input type="text" class="search-input" id="searchInput"
             placeholder="작성자 ID 또는 내용 검색..."
             th:value="${param.search != null ? param.search[0] : ''}">
      <select class="filter-select" id="statusFilter" onchange="applyFilters()">
        <option value=""         th:selected="${param.status == null or param.status == ''}">전체</option>
        <option value="active"   th:selected="${param.status != null and param.status[0] == 'active'}">활성</option>
        <option value="hidden"   th:selected="${param.status != null and param.status[0] == 'hidden'}">숨김</option>
        <option value="deleted"  th:selected="${param.status != null and param.status[0] == 'deleted'}">삭제됨</option>
      </select>
    </div>
 
    <!-- 3. 게시글 탭 -->
    <div id="postTab">
		<p th:if="${param.status == null or param.status[0] != 'deleted'}"
	  	 style="font-size:12px; color:#9ca3af; margin-bottom:12px;">
		  📌 삭제된 게시글은 상태 필터에서 <strong>삭제됨</strong> 선택 시 확인할 수 있습니다.
		</p>
      <!-- 통계: 4열 (삭제됨 추가) -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="label">총 게시글</div>
          <div class="value" th:text="${totalCount}">0</div>
        </div>
        <div class="stat-card">
          <div class="label">활성</div>
          <div class="value green" th:text="${activeCount}">0</div>
        </div>
        <div class="stat-card">
          <div class="label">숨김</div>
          <div class="value yellow" th:text="${hiddenCount}">0</div>
        </div>
        <div class="stat-card">
          <div class="label">삭제됨</div>
          <div class="value red" th:text="${deletedCount}">0</div>
        </div>
      </div>

      <table class="post-table">
        <thead>
          <tr>
            <th style="width:50px;">ID</th>
            <th style="width:120px;">작성자</th>
            <th>제목</th>
            <th style="width:80px;" class="center">조회수</th>
            <th style="width:100px;" class="center">등록일</th>
            <th style="width:80px;" class="center">상태</th>
            <th style="width:100px;" class="center">표시/숨김</th>
          </tr>
        </thead>
        <tbody>
         <tr th:each="post : ${posts}"
		    th:if="${post.postStatus != 'DELETED' or (param.status != null and param.status[0] == 'deleted')}"
		    th:classappend="${post.postStatus == 'DELETED'} ? 'deleted-row'">

            <td th:text="${post.postId}"></td>
            <td th:text="${post.memberId}"></td>
            <td th:text="${post.title} ?: '-'"></td>
            <td class="center" th:text="${post.viewCount}"></td>
            <td class="center" th:text="${post.createdAt != null} ? ${#strings.substring(post.createdAt.toString(), 0, 10)} : '-'"></td>
            <td class="center">
              <span th:if="${post.postStatus == 'DELETED'}" class="status-badge deleted">삭제됨</span>
              <span th:if="${post.postStatus != 'DELETED' and post.isHidden == 0}" class="status-badge active">활성</span>
			  <span th:if="${post.postStatus != 'DELETED' and post.isHidden == 1}" class="status-badge hidden">숨김</span>
            </td>
            <td class="center">

			  <div class="toggle-wrapper"
			       th:if="${post.postStatus != 'DELETED'}">
			
			    <div class="toggle-switch"
			         th:classappend="${post.isHidden == 0} ? 'on' : ''"
			         th:attr="onclick='togglePost(' + ${post.postId} + ', ' + ${post.isHidden} + ')'">
			    </div>
			
			    <span class="visibility-icon"
			          th:classappend="${post.isHidden == 0} ? 'visible'"
			          th:text="${post.isHidden == 0} ? '👁' : '🚫'">
			    </span>
			
			  </div>
			
			  <span th:if="${post.postStatus == 'DELETED'}">-</span>
			
			</td>
          </tr>
          <tr th:if="${#lists.isEmpty(posts)}">
            <td colspan="7" style="text-align:center; padding:40px; color:#9ca3af;">게시글이 없습니다.</td>
          </tr>
        </tbody>
      </table>

      <div class="table-footer">
        <span class="total-count">총 <span th:text="${filteredCount}"></span>개의 게시글</span>
        <div class="pagination">
          <a th:href="@{posts(page=1,search=${param.search},status=${param.status})}"
             th:classappend="${currentPage == 1} ? 'disabled'">«</a>
          <a th:href="@{posts(page=${currentPage > 1 ? currentPage-1 : 1},search=${param.search},status=${param.status})}"
             th:classappend="${currentPage == 1} ? 'disabled'">이전</a>
          <span th:each="i : ${#numbers.sequence(1, totalPages)}">
            <a th:href="@{posts(page=${i},search=${param.search},status=${param.status})}"
               th:text="${i}" th:classappend="${i == currentPage} ? 'active'"></a>
          </span>
          <a th:href="@{posts(page=${currentPage < totalPages ? currentPage+1 : totalPages},search=${param.search},status=${param.status})}"
             th:classappend="${currentPage == totalPages} ? 'disabled'">다음</a>
          <a th:href="@{posts(page=${totalPages},search=${param.search},status=${param.status})}"
             th:classappend="${currentPage == totalPages} ? 'disabled'">»</a>
        </div>
      </div>
    </div>

    <!-- 4. 댓글 탭 -->
    <div id="commentTab" style="display:none;">
		<p th:if="${param.status == null or param.status[0] != 'deleted'}"
	  	 style="font-size:12px; color:#9ca3af; margin-bottom:12px;">
		  📌 삭제된 댓글은 상태 필터에서 <strong>삭제됨</strong> 선택 시 확인할 수 있습니다.
		</p>
      <!-- 통계: 4열 (삭제됨 추가) -->
      <div class="stats-grid">
        <div class="stat-card">
		  <div class="label">총 댓글</div>
		  <div class="value" th:text="${commentActive + commentHidden + commentDeleted}">0</div>
		</div>
        <div class="stat-card">
          <div class="label">활성</div>
          <div class="value green" th:text="${commentActive}">0</div>
        </div>
        <div class="stat-card">
          <div class="label">숨김</div>
          <div class="value yellow" th:text="${commentHidden}">0</div>
        </div>
        <div class="stat-card">
          <div class="label">삭제됨</div>
          <div class="value red" th:text="${commentDeleted}">0</div>
        </div>
      </div>

      <table class="post-table">
        <thead>
          <tr>
            <th style="width:50px;">ID</th>
            <th style="width:120px;">작성자</th>
            <th>내용</th>
            <th style="width:80px;" class="center">게시글 ID</th>
            <th style="width:100px;" class="center">등록일</th>
            <th style="width:80px;" class="center">상태</th>
            <th style="width:100px;" class="center">변경</th>
          </tr>
        </thead>
        <tbody>
         <tr th:each="comment : ${comments}"
		    th:if="${comment.status != 'DELETED' or (param.status != null and param.status[0] == 'deleted')}"
		    th:classappend="${comment.status == 'DELETED'} ? 'deleted-row'">
            <td th:text="${comment.commentId}"></td>
            <td th:text="${comment.memberId}"></td>
            <td th:text="${comment.content} ?: '-'"></td>
            <td class="center" th:text="${comment.postId}"></td>
            <td class="center" th:text="${comment.createdAt != null} ? ${#strings.substring(comment.createdAt.toString(), 0, 10)} : '-'"></td>
            <td class="center">
              <span th:if="${comment.status == 'DELETED'}"  class="status-badge deleted">삭제됨</span>
              <span th:if="${comment.status != 'DELETED' and comment.isHidden == 0}" class="status-badge active">활성</span>
              <span th:if="${comment.status != 'DELETED' and comment.isHidden == 1}" class="status-badge hidden">숨김</span>
            </td>
            <td class="center">

			  <div class="toggle-wrapper"
			       th:if="${comment.status != 'DELETED'}">
			
			    <div class="toggle-switch"
			         th:classappend="${comment.isHidden == 0} ? 'on' : ''"
			         th:attr="onclick='toggleComment(' + ${comment.commentId} + ', ' + ${comment.isHidden} + ')'">
			    </div>
			
			    <span class="visibility-icon"
			          th:classappend="${comment.isHidden == 0} ? 'visible'"
			          th:text="${comment.isHidden == 0} ? '👁' : '🚫'">
			    </span>
			
			  </div>
			
			  <span th:if="${comment.status == 'DELETED'}">-</span>
			
			</td>
          </tr>
          <tr th:if="${#lists.isEmpty(comments)}">
            <td colspan="7" style="text-align:center; padding:40px; color:#9ca3af;">댓글이 없습니다.</td>
          </tr>
        </tbody>
      </table>

      <div class="table-footer">
        <span class="total-count">총 <span th:text="${commentDisplayCount}"></span>개의 댓글</span>
        <div class="pagination">
          <a th:href="@{posts(tab='comment',page=1,search=${param.search},status=${param.status})}"
             th:classappend="${currentPage == 1} ? 'disabled'">«</a>
          <a th:href="@{posts(tab='comment',page=${currentPage > 1 ? currentPage-1 : 1},search=${param.search},status=${param.status})}"
             th:classappend="${currentPage == 1} ? 'disabled'">이전</a>
          <span th:each="i : ${#numbers.sequence(1, commentPages)}">
            <a th:href="@{posts(tab='comment',page=${i},search=${param.search},status=${param.status})}"
               th:text="${i}" th:classappend="${i == currentPage} ? 'active'"></a>
          </span>
          <a th:href="@{posts(tab='comment',page=${currentPage < commentPages ? currentPage+1 : commentPages},search=${param.search},status=${param.status})}"
             th:classappend="${currentPage == commentPages} ? 'disabled'">다음</a>
          <a th:href="@{posts(tab='comment',page=${commentPages},search=${param.search},status=${param.status})}"
             th:classappend="${currentPage == commentPages} ? 'disabled'">»</a>
        </div>
      </div>
    </div>

  </div>
</section>

<div class="toast" id="toast"></div>
</body>
</html>
