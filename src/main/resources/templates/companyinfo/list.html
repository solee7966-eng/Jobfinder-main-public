<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="ko"
      th:replace="~{layout/layout_main :: layout(~{::title}, ~{::th:block[@data-slot='link']}, ~{::th:block[@data-slot='css']}, ~{::th:block[@data-slot='script']}, ~{::div#companyListWrap})}">

<head>
  <title>기업정보 | 잡파인더</title>

  <th:block data-slot="link"></th:block>

  <th:block data-slot="css">
    <style>
      .gap-2 { gap: .5rem; }
      .co-banner { background: linear-gradient(135deg, #3b9fd8 0%, #29b6f6 55%, #a8e6ff 100%); padding: 48px 0 40px; color: #fff; }
      .co-banner__title { font-size: 28px; font-weight: 900; margin-bottom: 6px; }
      .co-banner__sub { font-size: 14px; opacity: .75; }
      .co-search-card { border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,.08); border: 1px solid #e9ecef; }
      .co-tab { border: 1px solid #dee2e6; background: #fff; border-radius: 20px; padding: 5px 14px; font-size: 13px; font-weight: 600; color: #495057; cursor: pointer; transition: all .2s; }
      .co-tab:hover { border-color: #09a3ff; color: #09a3ff; }
      .co-tab.active { background: #09a3ff; border-color: #09a3ff; color: #fff; }
      .co-sort-btn { font-size: 13px; color: #6c757d; background: none; border: none; padding: 4px 8px; cursor: pointer; border-radius: 6px; }
      .co-sort-btn.active, .co-sort-btn:hover { color: #09a3ff; font-weight: 700; background: #e8f5ff; }
      .co-sort-divider { color: #dee2e6; margin: 0 2px; font-size: 12px; }
      .co-card { border: 1px solid #e9ecef; border-radius: 14px; background: #fff; transition: all .25s; text-decoration: none; color: inherit; display: block; overflow: hidden; }
      .co-card:hover { transform: translateY(-5px); box-shadow: 0 8px 28px rgba(9,163,255,.13); border-color: #09a3ff44; text-decoration: none; color: inherit; }
      .co-card__logo-wrap { height: 120px; background: #f8f9fa; border-bottom: 1px solid #f1f3f5; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
      .co-card__logo-placeholder { width: 100%; height: 100%; background: #f0f1f3; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
      .co-card__logo-placeholder .placeholder-icon { font-size: 36px; color: #bfc4cc; }
      .co-card__logo-placeholder .placeholder-name { font-size: 12px; font-weight: 600; color: #9ca3af; max-width: 85%; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .co-card__logo-img { width: 100%; height: 100%; object-fit: cover; }
      .co-card__hiring-badge { position: absolute; top: 10px; right: 12px; background: #e8fff0; color: #19a34a; border: 1px solid #a3e6be; border-radius: 20px; font-size: 11px; font-weight: 700; padding: 2px 9px; display: flex; align-items: center; gap: 3px; }
      .co-card__hiring-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #19a34a; display: inline-block; }
      .co-card__body { padding: 16px; }
      .co-card__name { font-size: 15px; font-weight: 800; color: #111; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .co-card__industry { font-size: 12px; color: #6c757d; margin-bottom: 10px; }
      .co-card__meta { font-size: 12px; color: #6c757d; display: flex; align-items: center; gap: 4px; margin-bottom: 5px; }
      .co-card__meta i { width: 13px; color: #adb5bd; flex-shrink: 0; }
      .co-card__footer { border-top: 1px solid #f1f3f5; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
      .co-card__post-cnt { font-size: 12px; font-weight: 700; color: #09a3ff; }
      .co-card__followers { font-size: 12px; color: #adb5bd; display: flex; align-items: center; gap: 3px; }
      .co-empty { text-align: center; padding: 80px 20px; color: #adb5bd; }
      .co-empty i { font-size: 56px; margin-bottom: 16px; display: block; }
      .jp-pagination .page-link { border-radius: 8px !important; margin: 0 2px; font-size: 14px; font-weight: 600; color: #495057; border-color: #dee2e6; }
      .jp-pagination .page-item.active .page-link { background: #09a3ff; border-color: #09a3ff; color: #fff; }
      .jp-pagination .page-link:hover { color: #09a3ff; border-color: #09a3ff; }
      .co-result-cnt { font-size: 14px; color: #6c757d; }
      .co-result-cnt strong { color: #09a3ff; }
    </style>
  </th:block>

  <th:block data-slot="script">
    <script th:inline="javascript">

      /* ===== 업종코드 → 한글명 매핑 ===== */
      var industryMap = {
        'IT':  'IT·인터넷',
        'SW':  '소프트웨어',
        'FIN': '금융·핀테크',
        'EDU': '교육·에듀테크',
        'MKT': '마케팅',
        'ETC': '기타'
      };
      function industryName(code) {
        return industryMap[code] || code || '-';
      }

      /* ===== 현재 선택값 ===== */
      var currentIndustry    = /*[[${industry}]]*/ '';
      var currentSort        = /*[[${sort}]]*/ 'follow';
      var currentCompanyType = /*[[${companyType}]]*/ '';
      var currentLocation    = /*[[${location}]]*/ '';
      var currentLocationDetail = /*[[${locationDetail}]]*/ '';

      /* ===== 서울/경기 상세지역 데이터 ===== */
      var locationDetailData = {
        '서울': ['강남구','강동구','강북구','강서구','관악구','광진구','구로구','금천구',
                 '노원구','도봉구','동대문구','동작구','마포구','서대문구','서초구',
                 '성동구','성북구','송파구','양천구','영등포구','용산구','은평구',
                 '종로구','중구','중랑구'],
        '경기': ['고양시','과천시','광명시','광주시','구리시','군포시','김포시','남양주시',
                 '동두천시','부천시','성남시','수원시','시흥시','안산시','안성시','안양시',
                 '양주시','여주시','오산시','용인시','의왕시','의정부시','이천시',
                 '파주시','평택시','포천시','하남시','화성시']
      };

      $(function () {

        /* ---- 업종 카드에 한글 표시 ---- */
        $('.co-card__industry-code').each(function() {
          $(this).text(industryName($(this).data('code')));
        });

        /* ---- 업종 탭 활성화 ---- */
        $('.co-tab').each(function() {
          var val = $(this).data('industry');
          $(this).toggleClass('active', val === currentIndustry || (currentIndustry === '' && val === ''));
        });

        /* ---- 정렬 버튼 활성화 ---- */
        $('.co-sort-btn').each(function() {
          $(this).toggleClass('active', $(this).data('sort') === currentSort);
        });

        /* ---- 체크박스 상태 복원 ---- */
        if (currentCompanyType) {
          currentCompanyType.split(',').forEach(function(v) {
            $('input[name="companyType"][value="' + v + '"]').prop('checked', true);
          });
        }
        if (currentLocation) {
          currentLocation.split(',').forEach(function(v) {
            $('input[name="location"][value="' + v + '"]').prop('checked', true);
          });
          // 상세지역 패널 복원
          var locArr = currentLocation.split(',');
          if (locArr.length > 0) showLocationDetail(locArr[locArr.length - 1]);
        }
        if (currentLocationDetail) {
          currentLocationDetail.split(',').forEach(function(v) {
            $('input[name="locationDetail"][value="' + v + '"]').prop('checked', true);
          });
        }

        /* ---- 필터 배지 초기 표시 ---- */
        updateFilterBadges();

        /* ---- 업종 탭 클릭 ---- */
        $('.co-tab').on('click', function () {
          $('input[name="industry"]').val($(this).data('industry'));
          $('input[name="currentPage"]').val(1);
          $('#coSearchForm').submit();
        });

        /* ---- 정렬 버튼 클릭 ---- */
        $('.co-sort-btn').on('click', function () {
          $('input[name="sort"]').val($(this).data('sort'));
          $('input[name="currentPage"]').val(1);
          $('#coSearchForm').submit();
        });

        /* ---- 드롭다운 내부 클릭 시 닫힘 방지 ---- */
        $(document).on('click', '.dropdown-menu', function(e) { e.stopPropagation(); });

        /* ---- 체크박스 변경 시 배지 업데이트 ---- */
        var filterChanged = false;
        $(document).on('change', '#coSearchForm input[type="checkbox"]', function() {
          if ($(this).attr('id') === 'hiringOnly') return;
          filterChanged = true;
          // 시/도 체크 시 상세지역 표시
          if ($(this).attr('name') === 'location') {
            var checked = $('input[name="location"]:checked');
            if (checked.length > 0) {
              showLocationDetail(checked.last().val());
            } else {
              $('#locationDetailSection').hide();
              $('input[name="locationDetail"]').prop('checked', false);
            }
          }
          updateFilterBadges();
        });

        /* ---- 드롭다운 닫힐 때 변경사항 있으면 submit ---- */
        $(document).on('hide.bs.dropdown', function() {
          if (filterChanged) {
            filterChanged = false;
            autoSubmit();
          }
        });
      });

      /* ===== 자동 submit ===== */
      function autoSubmit() {
        var companyTypes = [];
        $('input[name="companyType"]:checked').each(function() { companyTypes.push($(this).val()); });
        $('input[name="companyTypeHidden"]').val(companyTypes.join(','));

        var locations = [];
        $('input[name="location"]:checked').each(function() { locations.push($(this).val()); });
        $('input[name="locationHidden"]').val(locations.join(','));

        var locationDetails = [];
        $('input[name="locationDetail"]:checked').each(function() { locationDetails.push($(this).val()); });
        $('input[name="locationDetailHidden"]').val(locationDetails.join(','));

        $('input[name="currentPage"]').val(1);
        $('#coSearchForm').submit();
      }

      /* ===== 상세지역 패널 표시 ===== */
      function showLocationDetail(region) {
        var details = locationDetailData[region];
        if (!details || details.length === 0) {
          $('#locationDetailSection').hide();
          return;
        }
        $('#selectedLocationLabel').text(region);
        var html = '';
        details.forEach(function(d, i) {
          html += '<div class="col-6"><div class="custom-control custom-checkbox mb-1">' +
            '<input type="checkbox" class="custom-control-input" id="locD_' + i + '" name="locationDetail" value="' + d + '">' +
            '<label class="custom-control-label small" for="locD_' + i + '">' + d + '</label>' +
            '</div></div>';
        });
        $('#locationDetailList').html(html);
        $('#locationDetailSection').show();
        // 기존 선택 복원
        if (currentLocationDetail) {
          currentLocationDetail.split(',').forEach(function(v) {
            $('input[name="locationDetail"][value="' + v + '"]').prop('checked', true);
          });
        }
      }

      /* ===== 필터 배지 업데이트 ===== */
      function updateFilterBadges() {
        var badges = '';
        var hasFilter = false;

        $('input[name="companyType"]:checked').each(function() {
          var val = $(this).val();
          badges += '<span class="badge badge-primary mr-1 mb-1 px-2 py-1" style="font-size:0.8rem;">' +
            val + ' <a href="#" class="text-white ml-1" onclick="removeFilter(\'companyType\',\'' + val + '\');return false;">&times;</a></span>';
          hasFilter = true;
        });
        $('input[name="location"]:checked').each(function() {
          var val = $(this).val();
          badges += '<span class="badge badge-primary mr-1 mb-1 px-2 py-1" style="font-size:0.8rem;">' +
            val + ' <a href="#" class="text-white ml-1" onclick="removeFilter(\'location\',\'' + val + '\');return false;">&times;</a></span>';
          hasFilter = true;
        });
        $('input[name="locationDetail"]:checked').each(function() {
          var val = $(this).val();
          badges += '<span class="badge badge-info mr-1 mb-1 px-2 py-1" style="font-size:0.8rem;">' +
            val + ' <a href="#" class="text-white ml-1" onclick="removeFilter(\'locationDetail\',\'' + val + '\');return false;">&times;</a></span>';
          hasFilter = true;
        });
        if (currentIndustry) {
          badges += '<span class="badge badge-primary mr-1 mb-1 px-2 py-1" style="font-size:0.8rem;">' +
            industryName(currentIndustry) + ' <a href="#" class="text-white ml-1" onclick="removeIndustryFilter();return false;">&times;</a></span>';
          hasFilter = true;
        }

        if (hasFilter) { $('#filterBadges').html(badges); $('#filterBadgeArea').show(); }
        else { $('#filterBadgeArea').hide(); }
      }

      function removeFilter(name, value) {
        $('input[name="' + name + '"][value="' + value + '"]').prop('checked', false);
        autoSubmit();
      }
      function removeIndustryFilter() {
        $('input[name="industry"]').val('');
        $('input[name="currentPage"]').val(1);
        $('#coSearchForm').submit();
      }
      function clearAllFilters() {
        $('input[type="checkbox"]').prop('checked', false);
        $('input[name="industry"]').val('');
        $('input[name="keyword"]').val('');
        $('#locationDetailSection').hide();
        $('input[name="currentPage"]').val(1);
        $('#coSearchForm').submit();
      }
    </script>
  </th:block>
</head>

<body>
<div id="companyListWrap">

  <div class="co-banner">
    <div class="container jp-container">
      <h1 class="co-banner__title"><i class="fas fa-building mr-2"></i>기업정보</h1>
      <p class="co-banner__sub">다양한 기업의 채용정보와 기업문화를 한눈에 확인하세요</p>
    </div>
  </div>

  <div class="container jp-container py-4">

    <div class="card co-search-card mb-4">
      <div class="card-body">
        <form th:action="@{/companyinfo/list}" method="get" id="coSearchForm">
          <input type="hidden" name="industry" th:value="${industry}">
          <input type="hidden" name="sort" th:value="${sort}">
          <input type="hidden" name="currentPage" th:value="${currentPage}">
          <input type="hidden" name="companyTypeHidden" value="">
          <input type="hidden" name="locationHidden" value="">
          <input type="hidden" name="locationDetailHidden" value="">

          <div class="d-flex mb-3" style="gap:.5rem;">
            <div class="flex-fill position-relative">
              <i class="fas fa-search position-absolute" style="left:12px;top:50%;transform:translateY(-50%);color:#adb5bd;"></i>
              <input type="text" name="keyword" th:value="${keyword}" class="form-control form-control-lg"
                     placeholder="기업명으로 검색" maxlength="100" style="padding-left:40px; border-radius:10px;">
            </div>
            <button type="submit" class="btn btn-primary btn-lg px-4" style="border-radius:10px;"
                    onclick="document.querySelector('input[name=currentPage]').value=1;">검색</button>
          </div>

          <!-- 업종 탭 (업종코드 기반) -->
          <div class="d-flex align-items-center flex-wrap" style="gap:.5rem;">
            <span class="text-secondary small font-weight-bold mr-2">업종</span>
            <button type="button" class="co-tab" data-industry="">전체</button>
            <button type="button" class="co-tab" data-industry="IT">IT·인터넷</button>
            <button type="button" class="co-tab" data-industry="SW">소프트웨어</button>
            <button type="button" class="co-tab" data-industry="FIN">금융·핀테크</button>
            <button type="button" class="co-tab" data-industry="EDU">교육·에듀테크</button>
            <button type="button" class="co-tab" data-industry="MKT">마케팅</button>
            <button type="button" class="co-tab" data-industry="ETC">기타</button>
          </div>

          <!-- 기업규모 / 지역 필터 -->
          <div class="d-flex align-items-center flex-wrap mt-2" style="gap:.5rem;">
            <div class="dropdown">
              <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" data-toggle="dropdown">기업규모</button>
              <div class="dropdown-menu p-3" style="width:200px;">
                <div class="d-flex justify-content-between align-items-center mb-2 pb-2 border-bottom">
                  <strong class="small">기업 규모 선택</strong>
                  <button type="button" class="btn btn-sm btn-link text-danger p-0"
                          onclick="$('input[name=companyType]').prop('checked',false);updateFilterBadges();"><small>초기화</small></button>
                </div>
                <div class="custom-control custom-checkbox mb-2"><input type="checkbox" class="custom-control-input" id="sz1" name="companyType" value="스타트업"><label class="custom-control-label small" for="sz1">스타트업</label></div>
                <div class="custom-control custom-checkbox mb-2"><input type="checkbox" class="custom-control-input" id="sz2" name="companyType" value="중소기업"><label class="custom-control-label small" for="sz2">중소기업</label></div>
                <div class="custom-control custom-checkbox mb-2"><input type="checkbox" class="custom-control-input" id="sz3" name="companyType" value="중견기업"><label class="custom-control-label small" for="sz3">중견기업</label></div>
                <div class="custom-control custom-checkbox mb-2"><input type="checkbox" class="custom-control-input" id="sz4" name="companyType" value="대기업"><label class="custom-control-label small" for="sz4">대기업</label></div>
                <div class="custom-control custom-checkbox"><input type="checkbox" class="custom-control-input" id="sz5" name="companyType" value="외국계"><label class="custom-control-label small" for="sz5">외국계</label></div>
              </div>
            </div>

            <div class="dropdown">
              <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" data-toggle="dropdown"><i class="fas fa-map-marker-alt"></i> 지역</button>
              <div class="dropdown-menu p-3" style="width:320px; max-height:400px; overflow-y:auto;">
                <div class="d-flex justify-content-between align-items-center mb-2 pb-2 border-bottom">
                  <strong class="small">지역 선택</strong>
                  <button type="button" class="btn btn-sm btn-link text-danger p-0"
                          onclick="$('input[name=location],input[name=locationDetail]').prop('checked',false);$('#locationDetailSection').hide();updateFilterBadges();"><small>초기화</small></button>
                </div>
                <p class="small font-weight-bold mb-2">시/도</p>
                <div class="row mb-2">
                  <div class="col-6">
                    <div class="custom-control custom-checkbox mb-2">
                      <input type="checkbox" class="custom-control-input" id="loc_seoul" name="location" value="서울">
                      <label class="custom-control-label small" for="loc_seoul">서울</label>
                    </div>
                  </div>
                  <div class="col-6">
                    <div class="custom-control custom-checkbox mb-2">
                      <input type="checkbox" class="custom-control-input" id="loc_gyeonggi" name="location" value="경기">
                      <label class="custom-control-label small" for="loc_gyeonggi">경기</label>
                    </div>
                  </div>
                </div>

                <!-- 상세지역 (시/도 선택 시 표시) -->
                <div class="border-top pt-2" id="locationDetailSection" style="display:none;">
                  <p class="small font-weight-bold mb-2"><span id="selectedLocationLabel"></span> 상세지역</p>
                  <div class="row" id="locationDetailList"></div>
                </div>
              </div>
            </div>

            <div class="custom-control custom-checkbox ml-2">
              <input type="checkbox" class="custom-control-input" id="hiringOnly" name="hiringOnly"
                     th:checked="${hiringOnly == 'on'}"
                     onchange="document.querySelector('input[name=currentPage]').value=1;document.getElementById('coSearchForm').submit();">
              <label class="custom-control-label small font-weight-bold" for="hiringOnly">
                <span class="text-success">채용중</span> 기업만 보기
              </label>
            </div>
          </div>
        </form>
      </div>
    </div>

    <!-- 적용된 필터 배지 -->
    <div class="mb-3" id="filterBadgeArea" style="display: none;">
      <div class="d-flex flex-wrap align-items-center gap-2">
        <small class="text-muted mr-2"><i class="fas fa-filter"></i> 적용 필터:</small>
        <span id="filterBadges"></span>
        <button type="button" class="btn btn-sm btn-link text-danger p-0 ml-2" onclick="clearAllFilters()"><small>전체 해제</small></button>
      </div>
    </div>

    <!-- 결과 카운트 & 정렬 -->
    <div class="d-flex align-items-center justify-content-between mb-3">
      <p class="co-result-cnt mb-0">
        총 <strong th:text="${totalCount}">0</strong>개 기업
        <span th:if="${keyword != null and keyword != ''}" class="ml-1">
          — "<span class="text-dark font-weight-bold" th:text="${keyword}"></span>" 검색 결과
        </span>
      </p>
      <div class="d-flex align-items-center">
        <button class="co-sort-btn" data-sort="follow">팔로워순</button>
        <span class="co-sort-divider">|</span>
        <button class="co-sort-btn" data-sort="post">채용공고순</button>
        <span class="co-sort-divider">|</span>
        <button class="co-sort-btn" data-sort="name">이름순</button>
      </div>
    </div>

    <!-- 기업 카드 그리드 -->
    <div th:if="${companies != null and not #lists.isEmpty(companies)}">
      <div class="row">
        <div th:each="company : ${companies}" class="col-md-6 col-lg-4 col-xl-3 mb-4">
          <a th:href="@{/companyinfo/detail/{id}(id=${company.memberId})}" class="co-card h-100">
            <div class="co-card__logo-wrap">
              <img th:if="${company.logoUrl != null and company.logoUrl != ''}" th:src="@{/{path}(path=${company.logoUrl})}" class="co-card__logo-img" alt="로고">
              <div th:unless="${company.logoUrl != null and company.logoUrl != ''}" class="co-card__logo-placeholder">
                <span class="placeholder-icon"><i class="fas fa-building"></i></span>
                <span class="placeholder-name" th:text="${company.companyName}">회사명</span>
              </div>
              <span class="co-card__hiring-badge" th:if="${company.activePostCount > 0}" th:text="'채용중 ' + ${company.activePostCount} + '건'">채용중 1건</span>
            </div>
            <div class="co-card__body">
              <div class="co-card__name" th:text="${company.companyName}">기업명</div>
              <div class="co-card__industry">
                <span class="co-card__industry-code" th:data-code="${company.industryCode}" th:text="${company.industryCode}">업종</span>
                <span th:if="${company.companyType != null}"> &middot; <span th:text="${company.companyType}">규모</span></span>
              </div>
              <div class="co-card__meta" th:if="${company.addr1 != null}"><i class="fas fa-map-marker-alt"></i><span th:text="${company.addr1}">주소</span></div>
              <div class="co-card__meta" th:if="${company.foundedYear != null}"><i class="far fa-calendar-alt"></i><span th:text="'설립 ' + ${company.foundedYear} + '년'">설립</span></div>
            </div>
            <div class="co-card__footer">
              <span th:if="${company.activePostCount > 0}" class="co-card__post-cnt"><i class="fas fa-briefcase mr-1"></i><span th:text="'채용공고 ' + ${company.activePostCount} + '건'"></span></span>
              <span th:unless="${company.activePostCount > 0}" class="co-card__post-cnt" style="color:#adb5bd;"><i class="fas fa-briefcase mr-1"></i>채용공고 없음</span>
              <span class="co-card__followers"><i class="fas fa-heart text-danger"></i><span th:text="${company.followerCount} + '명'">0명</span></span>
            </div>
          </a>
        </div>
      </div>
    </div>

    <div th:if="${companies == null or #lists.isEmpty(companies)}" class="co-empty">
      <i class="fas fa-building"></i>
      <p class="font-weight-bold mb-1">검색 결과가 없습니다.</p>
      <p class="small">검색어나 필터를 변경해보세요.</p>
    </div>

    <nav th:if="${totalPages > 1}" class="d-flex justify-content-center mt-4">
      <ul class="pagination jp-pagination">
        <li class="page-item" th:classappend="${blockStart == 1} ? 'disabled'">
          <a class="page-link" th:href="@{/companyinfo/list(keyword=${keyword},industry=${industry},companyType=${companyType},location=${location},sort=${sort},hiringOnly=${hiringOnly},currentPage=${blockStart - 1})}"><i class="fas fa-chevron-left"></i></a>
        </li>
        <li th:each="page : ${#numbers.sequence(blockStart, blockEnd)}" class="page-item" th:classappend="${page == currentPage} ? 'active'">
          <a class="page-link" th:href="@{/companyinfo/list(keyword=${keyword},industry=${industry},companyType=${companyType},location=${location},sort=${sort},hiringOnly=${hiringOnly},currentPage=${page})}" th:text="${page}">1</a>
        </li>
        <li class="page-item" th:classappend="${blockEnd == totalPages} ? 'disabled'">
          <a class="page-link" th:href="@{/companyinfo/list(keyword=${keyword},industry=${industry},companyType=${companyType},location=${location},sort=${sort},hiringOnly=${hiringOnly},currentPage=${blockEnd + 1})}"><i class="fas fa-chevron-right"></i></a>
        </li>
      </ul>
    </nav>

  </div>
</div>
</body>
</html>
