<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>채팅 상세</title>
	<style>
	    body {
	        margin: 0;
	        padding: 0;
	        font-family: Arial, sans-serif;
	        background-color: #f4f6f8;
	        color: #222;
	    }
	
	    .chat-detail-wrap {
	        width: 900px;
	        height: 90vh;
	        margin: 20px auto;
	        background-color: #fff;
	        border: 1px solid #e5e8eb;
	        border-radius: 16px;
	        display: flex;
	        flex-direction: column;
	        overflow: hidden;
	        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
	    }
	
	    .chat-header {
	        padding: 18px 20px;
	        border-bottom: 1px solid #eef0f2;
	        background-color: #fff;
	        display: flex;
	        align-items: center;
	        gap: 14px;
	    }
	
	    .back-btn {
	        border: none;
	        background-color: #f1f3f5;
	        color: #333;
	        border-radius: 10px;
	        padding: 10px 14px;
	        cursor: pointer;
	        font-size: 14px;
	        transition: background-color 0.2s ease;
	        flex-shrink: 0;
	    }
	
	    .back-btn:hover {
	        background-color: #e2e6ea;
	    }
	
	    .chat-header-info {
	        flex: 1;
	        min-width: 0;
	    }
	
	    .chat-header-info h2 {
	        margin: 0;
	        font-size: 22px;
	        font-weight: 700;
	        color: #111;
	    }
	
	    .chat-header-info p {
	        margin: 5px 0 0;
	        font-size: 13px;
	        color: #777;
	    }
	
	    .connect-status {
	        padding: 7px 11px;
	        border-radius: 999px;
	        font-size: 12px;
	        font-weight: 700;
	        white-space: nowrap;
	    }
	
	    .connect-status.connecting {
	        background-color: #fff7e6;
	        color: #d48806;
	    }
	
	    .connect-status.connected {
	        background-color: #e6f7ed;
	        color: #1f8f4d;
	    }
	
	    .connect-status.disconnected {
	        background-color: #fff1f0;
	        color: #cf1322;
	    }
	
	    .message-area {
	        flex: 1;
	        overflow-y: auto;
	        padding: 24px 26px;
	        background-color: #f8fafc;
	    }
	    
	    /* 메시지 날짜가 바뀔 때 표시되는 날짜 구분선 */
		.date-divider {
		    display: flex;
		    justify-content: center;
		    margin: 18px 0;
		}
		
		/* 날짜 구분선 텍스트 스타일 */
		.date-divider span {
		    padding: 6px 12px;
		    border-radius: 999px;
		    background-color: #e9eef5;
		    color: #666;
		    font-size: 12px;
		    font-weight: 700;
		}
	
	    .message-item {
	        margin-bottom: 16px;
	        display: flex;
	        flex-direction: column;
	        max-width: 68%;
	    }
	
	    .message-item.mine {
	        margin-left: auto;
	        align-items: flex-end;
	    }
	
	    .message-item.other {
	        margin-right: auto;
	        align-items: flex-start;
	    }
	
	    .message-content {
	        padding: 12px 15px;
	        border-radius: 16px;
	        font-size: 14px;
	        line-height: 1.55;
	        word-break: break-word;
	        white-space: pre-wrap;
	        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
	    }
	
	    .message-item.mine .message-content {
	        background-color: #2563eb;
	        color: #fff;
	        border-bottom-right-radius: 4px;
	    }
	
	    .message-item.other .message-content {
	        background-color: #fff;
	        color: #222;
	        border: 1px solid #e5e8eb;
	        border-bottom-left-radius: 4px;
	    }
	
	    .message-meta {
		    margin-top: 5px;
		    display: flex;
		    gap: 6px;
		    align-items: center;
		    font-size: 12px;
		    color: #999;
		}
		
		.message-item.mine .message-meta {
		    justify-content: flex-end;
		}
		
		/* 메시지 전송 상태 텍스트 */
		.message-status {
		    color: #999;
		    font-size: 12px;
		}
		
		/* 전송 실패 상태 */
		.message-status.failed {
		    color: #cf1322;
		    font-weight: 700;
		    cursor: pointer;
		}
		
		/* 전송 실패 메시지 말풍선 */
		.message-item.failed .message-content {
		    opacity: 0.75;
		}
		
		/* 전송중 메시지 말풍선 */
		.message-item.sending .message-content {
		    opacity: 0.75;
		}
		
		/* 전송 대기 메시지 말풍선 */
		.message-item.queued .message-content {
		    opacity: 0.65;
		}
		
		/* 전송 대기 상태 텍스트 */
		.message-status.queued {
		    color: #777;
		}
		
		.message-read {
		    color: #2563eb;
		    font-weight: 700;
		}
	
	    .empty-message {
	        text-align: center;
	        color: #777;
	        margin: 100px auto 0;
	        padding: 28px;
	        border: 1px dashed #d8dde3;
	        border-radius: 14px;
	        background-color: #fff;
	        line-height: 1.6;
	        max-width: 360px;
	    }
	
	    .empty-message strong {
	        display: block;
	        margin-bottom: 6px;
	        color: #333;
	        font-size: 16px;
	    }
	
	    .chat-input-wrap {
	        border-top: 1px solid #eef0f2;
	        background-color: #fff;
	        padding: 14px 16px 16px;
	    }
	
	    .chat-input-guide {
	        margin-bottom: 8px;
	        font-size: 12px;
	        color: #888;
	    }
	
	    .chat-input-box {
	        display: flex;
	        gap: 10px;
	        align-items: stretch;
	    }
	
	    .chat-input-box textarea {
	        flex: 1;
	        height: 76px;
	        resize: none;
	        border: 1px solid #d8dde3;
	        border-radius: 12px;
	        padding: 12px;
	        box-sizing: border-box;
	        font-size: 14px;
	        outline: none;
	        line-height: 1.5;
	    }
	
	    .chat-input-box textarea:focus {
	        border-color: #2563eb;
	    }
	
	    .chat-input-box button {
	        width: 100px;
	        border: none;
	        border-radius: 12px;
	        background-color: #2563eb;
	        color: white;
	        font-size: 14px;
	        font-weight: 700;
	        cursor: pointer;
	        transition: background-color 0.2s ease;
	    }
	
	    .chat-input-box button:hover:not(:disabled) {
	        background-color: #1d4ed8;
	    }
	
	    .chat-input-box button:disabled {
	        background-color: #cbd5e1;
	        cursor: not-allowed;
	    }
	</style>
</head>
<body>


<div class="chat-detail-wrap">
    <div class="chat-header">
	    <button type="button" class="back-btn" onclick="goBack()">←</button>
	
	    <div class="chat-header-info">
	        <h2 th:text="${roomDetail.opponentName}">상대방</h2>
			<p th:if="${roomDetail.jobTitle != null}"
			   th:text="${roomDetail.jobTitle}">
			    공고 제목
			</p>
			<p th:unless="${roomDetail.jobTitle != null}">
			    지원 관련 대화
			</p>
	    </div>
	
	    <div id="connectStatus" class="connect-status connecting">
	        연결 중
	    </div>
	</div>

    <div id="messageArea" class="message-area">
        <!-- 메시지 렌더링 -->
    </div>

    <div class="chat-input-wrap">
	    <div class="chat-input-guide">
	        Enter 전송 · Shift + Enter 줄바꿈
	    </div>
	
	    <div class="chat-input-box">
	        <textarea id="messageContent"
	                  maxlength="1000"
	                  placeholder="메시지를 입력하세요."></textarea>
	
	        <button type="button" id="sendBtn" disabled>전송</button>
	    </div>
	</div>
</div>

<input type="hidden" id="roomId" th:value="${roomId}">
<input type="hidden" id="loginMemberId" th:value="${loginMemberId}">
<input type="hidden" id="opponentName" th:value="${roomDetail.opponentName}">



<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
    let stompClient = null;
    let roomId = null;
    let loginMemberId = null;
    
 	// WebSocket 재연결 상태 관리용
    let reconnectTimer = null;

    // 페이지 이탈 시 재연결을 막기 위한 플래그
    let isPageLeaving = false;

    // 메시지 topic 구독 객체
    let messageSubscription = null;

    // 읽음 topic 구독 객체
    let readSubscription = null;

    // 재연결 시도 간격
    const RECONNECT_DELAY_MS = 3000;
    
 	// 연결 끊김 중 사용자가 작성하던 메시지를 임시 보관한다.
    let draftMessageContent = "";
    
 	// 중복 읽음 요청 방지용
    let lastRequestedReadMessageId = 0;
    let readTimer = null;
    
 	// 메시지 페이징 상태값
    let oldestMessageId = null;
    let isLoadingPrevious = false;
    let hasMoreMessages = true;
    const MESSAGE_PAGE_SIZE = 10;
    
 	// 전송중 메시지 타이머 관리용
    const pendingMessageTimers = {};
    const SEND_TIMEOUT_MS = 8000;
    
 	// WebSocket 끊김 중 전송 대기 메시지를 저장하는 queue
    const messageSendQueue = [];

    // queue 자동 전송 중복 실행 방지용 플래그
    let isFlushingQueue = false;
    

    document.addEventListener("DOMContentLoaded", function () {
        roomId = document.getElementById("roomId").value;
        loginMemberId = document.getElementById("loginMemberId").value;

        if (!roomId) {
            alert("채팅방 정보가 없습니다.");
            return;
        }

        loadMessages(roomId);
        bindSendEvent(roomId);
        bindMessageScrollPaging();
        updateInputAvailable(); // 연결 전에는 입력창/전송 버튼을 비활성화한다.
        connectWebSocket(roomId);
    });

    
    /**
     * 최초 메시지 목록 조회
     * 채팅방 진입 시 최신 메시지 MESSAGE_PAGE_SIZE건을 불러온다.
     */
    async function loadMessages(roomId) {
        try {
            const response = await fetch("/user-service/api/chat/rooms/" + roomId + "/messages?size=" + MESSAGE_PAGE_SIZE, {
                method: "GET",
                headers: {
                    "Content-Type": "application/json"
                }
            });

            if (!response.ok) {
                throw new Error("메시지 목록 조회 실패");
            }

            const messages = await response.json();

            renderMessages(messages);

            if (messages && messages.length > 0) {
                oldestMessageId = messages[0].messageId;

                // 조회된 개수가 page size보다 작으면 더 이상 이전 메시지가 없다고 판단한다.
                hasMoreMessages = messages.length >= MESSAGE_PAGE_SIZE;

                const lastMessageId = messages[messages.length - 1].messageId;
                requestMarkAsRead(roomId, lastMessageId);
            } else {
                hasMoreMessages = false;
            }
        } catch (error) {
            console.error(error);
            document.getElementById("messageArea").innerHTML = `
                <div class="empty-message">
                    <strong>메시지를 불러오지 못했습니다.</strong>
                    잠시 후 다시 시도해주세요.
                </div>
            `;
        }
    }
    
    
    /**
     * 이전 메시지 목록 조회
     * 현재 화면에서 가장 오래된 메시지 ID보다 작은 메시지를 추가 조회한다.
     */
    async function loadPreviousMessages() {
        if (isLoadingPrevious || !hasMoreMessages || !oldestMessageId) {
            return;
        }

        isLoadingPrevious = true;

        const container = document.getElementById("messageArea");
        const previousScrollHeight = container.scrollHeight;

        try {
            const url = "/user-service/api/chat/rooms/"
                + roomId
                + "/messages?lastMessageId="
                + oldestMessageId
                + "&size="
                + MESSAGE_PAGE_SIZE;

            const response = await fetch(url, {
                method: "GET",
                headers: {
                    "Content-Type": "application/json"
                }
            });

            if (!response.ok) {
                throw new Error("이전 메시지 조회 실패");
            }

            const messages = await response.json();

            if (!messages || messages.length === 0) {
                hasMoreMessages = false;
                return;
            }

            prependMessages(messages);

            oldestMessageId = messages[0].messageId;
            hasMoreMessages = messages.length >= MESSAGE_PAGE_SIZE;

            // 이전 메시지를 위에 붙인 뒤, 사용자가 보던 위치가 밀리지 않도록 스크롤 위치 보정
            const newScrollHeight = container.scrollHeight;
            container.scrollTop = newScrollHeight - previousScrollHeight;

        } catch (error) {
            console.error("이전 메시지 조회 실패", error);
        } finally {
            isLoadingPrevious = false;
        }
    }

    
    function renderMessages(messages) {
        const container = document.getElementById("messageArea");
        container.innerHTML = "";

        if (!messages || messages.length === 0) {
        	container.innerHTML = `
        	    <div class="empty-message">
        	        <strong>아직 메시지가 없습니다.</strong>
        	        첫 메시지를 보내 대화를 시작해보세요.
        	    </div>
        	`;
            return;
        }

        messages.forEach(message => {
            message.mine = (message.senderMemberId === loginMemberId);
            appendMessage(message);
        });

        
        rebuildDateDividers();  // 최초 렌더링 후 날짜 구분선을 한 번 정리한다.
        rebuildMessageTimes();  // 같은 시간대의 연속 메시지는 마지막 메시지만 시간이 보이도록 정리한다.
        rebuildReadStatus();	// 최초 렌더링 후 읽음 표시를 마지막 메시지 기준으로 정리한다. 

        scrollToBottom();
    }

    
    /**
     * 메시지 한 건의 HTML을 생성한다.
     * 전송 상태가 있으면 전송중/실패 상태도 함께 표시한다.
     */
    function createMessageHtml(message) {
    	const isReadByOpponent = message.mine && message.readByOpponent; // 상대방이 읽은 내 메시지인지 판단한다.
    	const readText = isReadByOpponent ? "읽음" : "";
        const messageTime = formatMessageTime(message.createdAt);
        const messageMinute = formatMessageTime(message.createdAt); // 같은 분 단위 메시지 묶음 처리를 위해 HH:mm 값을 저장한다.
        const messageStatus = createMessageStatusText(message);

        return `
        <div class="message-item ${message.mine ? 'mine' : 'other'} ${message.sendStatus || ''}" 
			        data-message-id="${message.messageId || ''}"
			        data-client-message-id="${message.clientMessageId || ''}"
			        data-message-date="${getMessageDate(message.createdAt)}"
			        data-message-minute="${messageMinute}"
			        data-sender-member-id="${message.senderMemberId || ''}">
                <div class="message-content">${escapeHtml(message.content)}</div>
                <div class="message-meta">
                	<span class="message-read" data-read="${isReadByOpponent ? 'true' : 'false'}">${readText}</span>
                	<span class="message-status ${message.sendStatus === 'failed' ? 'failed' : ''} ${message.sendStatus === 'queued' ? 'queued' : ''}">
	                    ${messageStatus}
	                </span>
                    <span class="message-time" data-original-time="${escapeHtml(messageTime)}">${escapeHtml(messageTime)}</span>
                </div>
            </div>
        `;
    }
    
    /**
     * 메시지 전송 상태에 따라 화면에 표시할 문구를 반환한다.
     */
     function createMessageStatusText(message) {
   	    if (message.sendStatus === "queued") {
   	        return "전송 대기";
   	    }

   	    if (message.sendStatus === "sending") {
   	        return "전송중";
   	    }

   	    if (message.sendStatus === "failed") {
   	        return "전송 실패 · 재전송";
   	    }

   	    return "";
   	}
    
    
     /**
      * 메시지 생성일에서 날짜 부분만 추출한다.
      * 예: 2026.04.28 13:45:20 -> 2026.04.28
      */
     function getMessageDate(createdAt) {
         if (!createdAt) return "";
         return createdAt.substring(0, 10);
     }


     /**
      * 메시지 생성일에서 시간 부분만 추출한다.
      * 예: 2026.04.28 13:45:20 -> 13:45
      */
     function formatMessageTime(createdAt) {
         if (!createdAt || createdAt.length < 16) return "";
         return createdAt.substring(11, 16);
     }


     /**
      * 날짜 구분선 HTML을 생성한다.
      */
     function createDateDividerHtml(messageDate) {
         return `
             <div class="date-divider" data-divider-date="${messageDate}">
                 <span>${escapeHtml(messageDate)}</span>
             </div>
         `;
     }
    
     
    /**
     * 새 메시지를 채팅창 아래쪽에 추가한다.
     * WebSocket으로 수신한 메시지나 최초 렌더링 메시지 출력에 사용한다.
     */
    function appendMessage(message) {
        const container = document.getElementById("messageArea");

        // 첫 메시지가 생기면 "메시지가 없습니다." 문구 삭제
        const emptyMessage = container.querySelector(".empty-message");
        if (emptyMessage) {
            emptyMessage.remove();
        }

     	// 서버 응답 메시지가 임시 메시지와 매칭되면 임시 메시지를 실제 메시지로 교체한다.
        if (message.clientMessageId && replaceTempMessageWithSavedMessage(message)) {
            return;
        }

        // 메시지 중복 방지
        if (message.messageId) {
            const alreadyExists = container.querySelector(`[data-message-id="${message.messageId}"]`);
            if (alreadyExists) {
                return;
            }
        }

        const messageDate = getMessageDate(message.createdAt);
        const lastMessageEl = container.querySelector(".message-item:last-of-type");
        const lastMessageDate = lastMessageEl ? lastMessageEl.dataset.messageDate : null;

        // 이전 메시지와 날짜가 다르면 날짜 구분선을 먼저 추가한다.
        if (messageDate && messageDate !== lastMessageDate) {
            container.insertAdjacentHTML("beforeend", createDateDividerHtml(messageDate));
        }

        const html = createMessageHtml(message);
        container.insertAdjacentHTML("beforeend", html);
        
        rebuildMessageTimes(); // 새 메시지 추가 후 같은 시간대 메시지의 시간 표시를 다시 정리한다.
        rebuildReadStatus(); // 새 메시지 추가 후 읽음 표시도 마지막 메시지 기준으로 다시 정리한다.
    }
    
    
    /**
     * 서버에서 저장 완료된 메시지가 오면 임시 메시지를 실제 메시지로 교체한다.
     */
    function replaceTempMessageWithSavedMessage(message) {
        if (!message.clientMessageId) {
            return false;
        }

        const tempEl = document.querySelector(`[data-client-message-id="${message.clientMessageId}"]`);

        if (!tempEl) {
            return false;
        }

        clearTimeout(pendingMessageTimers[message.clientMessageId]);
        delete pendingMessageTimers[message.clientMessageId];

        message.mine = true;
        message.sendStatus = "sent";

        tempEl.insertAdjacentHTML("afterend", createMessageHtml(message));
        tempEl.remove();

        rebuildDateDividers();
        rebuildMessageTimes(); // 임시 메시지를 실제 메시지로 교체한 뒤 시간 표시를 다시 정리한다.
        rebuildReadStatus(); // 임시 메시지를 실제 메시지로 교체한 뒤 읽음 표시도 다시 정리한다.

        return true;
    }
    
    
    /**
     * 서버 응답이 일정 시간 안에 오지 않으면 메시지를 실패 상태로 변경한다.
     */
    function markMessageAsFailed(clientMessageId) {
        const messageEl = document.querySelector(`[data-client-message-id="${clientMessageId}"]`);

        if (!messageEl) {
            return;
        }

        messageEl.classList.remove("sending");
        messageEl.classList.add("failed");

        const statusEl = messageEl.querySelector(".message-status");
        if (statusEl) {
            statusEl.textContent = "전송 실패 · 재전송";
            statusEl.classList.add("failed");
        }
    }
    
    
    /**
     * 연결 끊김 상태에서 보낸 메시지를 queue에 저장한다.
     */
    function enqueueMessage(payload) {
        messageSendQueue.push(payload); // 재연결 후 순서대로 전송하기 위해 배열 뒤에 추가한다.
    }
    
    
    /**
     * queue 메시지를 실제 전송 상태로 변경한다.
     */
    function markQueuedMessageAsSending(clientMessageId) {
        const messageEl = document.querySelector(`[data-client-message-id="${clientMessageId}"]`);

        if (!messageEl) {
            return;
        }

        messageEl.classList.remove("queued");
        messageEl.classList.add("sending");

        const statusEl = messageEl.querySelector(".message-status");
        if (statusEl) {
            statusEl.textContent = "전송중";
            statusEl.classList.remove("queued");
            statusEl.classList.remove("failed");
        }
    }
    
    
    /**
     * 이전 메시지를 채팅창 위쪽에 추가한다.
     * 이미 화면에 있는 메시지는 중복 추가하지 않는다.
     */
    function prependMessages(messages) {
        const container = document.getElementById("messageArea");

        for (let i = messages.length - 1; i >= 0; i--) {
            const message = messages[i];
            message.mine = (message.senderMemberId === loginMemberId);

            const alreadyExists = container.querySelector(`[data-message-id="${message.messageId}"]`);
            if (alreadyExists) {
                continue;
            }

            const html = createMessageHtml(message);
            container.insertAdjacentHTML("afterbegin", html);
        }

        rebuildDateDividers();  // 이전 메시지를 위에 붙인 뒤 날짜 구분선을 다시 정리한다.
        rebuildMessageTimes();  // 이전 메시지를 불러온 뒤에도 같은 시간대 메시지 표시를 다시 정리한다.
        rebuildReadStatus();    // 이전 메시지를 불러온 뒤 읽음 표시도 다시 정리한다.
    }
    
    
    /**
     * 현재 화면에 있는 메시지를 기준으로 날짜 구분선을 다시 구성한다.
     * 페이징으로 이전 메시지를 불러올 때 날짜 구분선 중복을 방지한다.
     */
    function rebuildDateDividers() {
        const container = document.getElementById("messageArea");

        container.querySelectorAll(".date-divider").forEach(function (divider) {
            divider.remove();
        });

        const messageItems = Array.from(container.querySelectorAll(".message-item"));
        let previousDate = null;

        messageItems.forEach(function (item) {
            const currentDate = item.dataset.messageDate;

            if (currentDate && currentDate !== previousDate) {
                item.insertAdjacentHTML("beforebegin", createDateDividerHtml(currentDate));
                previousDate = currentDate;
            }
        });
    }
    
    
    //시간 표시 재정렬 함수
    function rebuildMessageTimes() {
	    const messageItems = Array.from(document.querySelectorAll("#messageArea .message-item"));
	
	    messageItems.forEach(function (item, index) {
	        const timeEl = item.querySelector(".message-time");
	
	        if (!timeEl) {
	            return;
	        }
	
	        const currentSender = item.dataset.senderMemberId;
	        const currentMinute = item.dataset.messageMinute;
	
	        const nextItem = messageItems[index + 1];
	        const nextSender = nextItem ? nextItem.dataset.senderMemberId : null;
	        const nextMinute = nextItem ? nextItem.dataset.messageMinute : null;
	
	        const originalTime = timeEl.dataset.originalTime || currentMinute || "";
	
	        if (currentSender && currentMinute && currentSender === nextSender && currentMinute === nextMinute) {
	            timeEl.textContent = ""; // 같은 사람이 같은 분에 연속으로 보낸 메시지는 현재 메시지 시간을 숨긴다.
	            return;
	        }
	
	        timeEl.textContent = originalTime; // 묶음의 마지막 메시지에는 시간을 표시한다.
	    });
	}
    
 	// 읽음 표시 재정렬 함수
    function rebuildReadStatus() {
        const messageItems = Array.from(document.querySelectorAll("#messageArea .message-item"));

        messageItems.forEach(function (item, index) {
            const readEl = item.querySelector(".message-read");

            if (!readEl) {
                return;
            }

            const isMine = item.classList.contains("mine");
            const isRead = readEl.dataset.read === "true";

            if (!isMine || !isRead) {
                readEl.textContent = "";
                return;
            }

            const currentSender = item.dataset.senderMemberId;
            const currentMinute = item.dataset.messageMinute;

            const nextItem = messageItems[index + 1];
            const nextSender = nextItem ? nextItem.dataset.senderMemberId : null;
            const nextMinute = nextItem ? nextItem.dataset.messageMinute : null;

            if (currentSender && currentMinute && currentSender === nextSender && currentMinute === nextMinute) {
                readEl.textContent = ""; // 같은 사람이 같은 분에 연속으로 보낸 메시지는 현재 읽음 표시를 숨긴다.
                return;
            }

            readEl.textContent = "읽음"; // 같은 시간 묶음의 마지막 메시지에만 읽음 표시를 보여준다.
        });
    }

    
    function bindSendEvent(roomId) {
        const sendBtn = document.getElementById("sendBtn");
        const textarea = document.getElementById("messageContent");

        sendBtn.addEventListener("click", function () {
            sendMessage(roomId);
        });

        textarea.addEventListener("keydown", function (e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage(roomId);
            }
        });

        textarea.addEventListener("input", function () {
        	saveDraftMessage(); // 입력할 때마다 현재 작성 내용을 임시 저장한다.
            updateInputAvailable(); // 입력값과 WebSocket 연결 상태를 함께 기준으로 버튼을 제어한다.
        });
        
     	// 전송 실패 메시지를 클릭하면 같은 내용으로 재전송한다.
        document.getElementById("messageArea").addEventListener("click", function (e) {
            const statusEl = e.target.closest(".message-status.failed");

            if (!statusEl) {
                return;
            }

            const failedMessageEl = statusEl.closest(".message-item");
            retryFailedMessage(failedMessageEl);
        });
    }
    
    
    /**
     * 채팅창 스크롤 이벤트 연결
     * 사용자가 채팅창 상단 근처로 이동하면 이전 메시지를 추가 조회한다.
     */
    function bindMessageScrollPaging() {
        const container = document.getElementById("messageArea");

        container.addEventListener("scroll", function () {
            if (container.scrollTop <= 30) {
                loadPreviousMessages();
            }
        });
    }

    
    function connectWebSocket(roomId) {
        if (isPageLeaving) {
            return;
        }

        updateConnectStatus("connecting");
        updateInputAvailable(); // 연결 시도 중에는 입력을 막는다.

        const socket = new SockJS("/user-service/ws-chat");
        stompClient = Stomp.over(socket);

        // 콘솔에 STOMP 내부 로그가 너무 많이 찍히는 것을 방지한다.
        stompClient.debug = null;

      	//성공시 콜백
        stompClient.connect({}, function () { 
        	updateConnectStatus("connected");
            updateInputAvailable(); // 재연결 성공 시 입력창 상태를 다시 계산한다.
            clearReconnectTimer(); // 연결 성공 시 예약된 재연결 타이머를 제거한다.
            subscribeChatTopics(); // 재연결 성공 시 메시지/읽음 topic을 다시 구독한다.
            flushMessageQueue(); // 재연결 성공 시 queue 메시지를 자동 전송한다.

        }, function (error) {
            console.error("WebSocket 연결 실패", error);
            handleSocketDisconnected(); // 연결 실패 시 끊김 상태 처리 후 재연결을 예약한다.
        });

        socket.onclose = function () {
            handleSocketDisconnected(); // 연결이 중간에 끊기면 자동 재연결을 예약한다.
        };
    }
    
    
    function subscribeChatTopics() {
        if (!stompClient || !stompClient.connected) {
            return;
        }

        // 기존 메시지 구독이 남아있으면 중복 수신 방지를 위해 해제한다.
        if (messageSubscription) {
            messageSubscription.unsubscribe();
            messageSubscription = null;
        }

        // 기존 읽음 구독이 남아있으면 중복 수신 방지를 위해 해제한다.
        if (readSubscription) {
            readSubscription.unsubscribe();
            readSubscription = null;
        }

        messageSubscription = stompClient.subscribe("/topic/chat/room/" + roomId, function (message) {
            const body = JSON.parse(message.body);
            body.mine = (body.senderMemberId === loginMemberId);

            appendMessage(body);
            scrollToBottom();

            if (!body.mine && document.visibilityState === "visible") {
                requestMarkAsRead(roomId, body.messageId);
            }
        });

        readSubscription = stompClient.subscribe("/topic/chat/room/" + roomId + "/read", function (message) {
            const event = JSON.parse(message.body);

            // 내가 보낸 읽음 이벤트는 무시한다.
            if (event.readerMemberId === loginMemberId) {
                return;
            }

            updateReadStatus(event.lastReadMessageId);
        });
    }
    
    
    function handleSocketDisconnected() {
        if (isPageLeaving) {
            return;
        }

        updateConnectStatus("disconnected");
        updateInputAvailable(); // 연결이 끊기면 입력창과 전송 버튼을 비활성화한다.

        scheduleReconnect(); // 연결이 끊기면 일정 시간 뒤 자동 재연결을 시도한다.
    }
    
    /**
     * 자동 재연결 함수
    */
    function scheduleReconnect() {
        if (isPageLeaving) {
            return;
        }

        if (reconnectTimer) {
            return;
        }

        reconnectTimer = setTimeout(function () {
            reconnectTimer = null;
            connectWebSocket(roomId); // 끊김 후 일정 시간 뒤 WebSocket을 다시 연결한다.
        }, RECONNECT_DELAY_MS);
    }


    function clearReconnectTimer() {
        if (reconnectTimer) {
            clearTimeout(reconnectTimer);
            reconnectTimer = null;
        }
    }
    
    
    /**
     * 재연결 성공 후 queue에 쌓인 메시지를 순서대로 자동 전송한다.
     */
    function flushMessageQueue() {
        if (isFlushingQueue) {
            return;
        }

        if (!stompClient || !stompClient.connected) {
            return;
        }

        isFlushingQueue = true;

        while (messageSendQueue.length > 0) {
            const payload = messageSendQueue.shift();

            markQueuedMessageAsSending(payload.clientMessageId); // 대기 상태를 전송중으로 변경한다.

            stompClient.send("/app/chat/send", {}, JSON.stringify(payload));

            pendingMessageTimers[payload.clientMessageId] = setTimeout(function () {
                markMessageAsFailed(payload.clientMessageId);
            }, SEND_TIMEOUT_MS);
        }

        isFlushingQueue = false;
    }

    
    /**
     * 메시지를 전송한다.
     * 연결 상태에 따라 즉시 전송하거나 queue에 저장한다.
     */
    function sendMessage(roomId) {
        const textarea = document.getElementById("messageContent");
        const content = textarea.value;

        if (!content || content.trim() === "") {
            return;
        }

        const clientMessageId = createClientMessageId();
        const isConnected = stompClient && stompClient.connected;
        const sendStatus = isConnected ? "sending" : "queued";

        const tempMessage = {
            messageId: "",
            clientMessageId: clientMessageId,
            roomId: Number(roomId),
            senderMemberId: loginMemberId,
            content: content,
            createdAt: createNowDateTimeText(),
            mine: true,
            sendStatus: sendStatus
        };

        appendMessage(tempMessage);
        scrollToBottom();

        const payload = {
            roomId: Number(roomId),
            content: content,
            messageType: "TEXT",
            clientMessageId: clientMessageId
        };

        if (!isConnected) {
            enqueueMessage(payload); // 연결 끊김 상태에서는 실패 처리하지 않고 queue에 저장한다.
        } else {
            stompClient.send("/app/chat/send", {}, JSON.stringify(payload));

            pendingMessageTimers[clientMessageId] = setTimeout(function () {
                markMessageAsFailed(clientMessageId);
            }, SEND_TIMEOUT_MS);
        }

        textarea.value = "";
        draftMessageContent = ""; // 전송 버튼 클릭 후 입력창 임시 저장값을 초기화한다.
        updateInputAvailable(); // 입력값 변경 후 버튼 상태를 다시 계산한다.
    }
    
    
    /**
     * 전송 실패한 메시지를 다시 전송한다.
     */
    function retryFailedMessage(failedMessageEl) {
        if (!failedMessageEl) {
            return;
        }

        const contentEl = failedMessageEl.querySelector(".message-content");
        const content = contentEl ? contentEl.textContent : "";

        if (!content || content.trim() === "") {
            return;
        }

        failedMessageEl.remove();

        const textarea = document.getElementById("messageContent");
        textarea.value = content;
        draftMessageContent = content; // 재전송 시에도 draft 상태를 동기화한다.

        sendMessage(roomId); // 연결 상태에 따라 즉시 전송하거나 queue에 다시 저장한다.
    }

    
    /**
     * 프론트에서만 사용하는 임시 메시지 ID를 생성한다.
     */
    function createClientMessageId() {
        return "temp-" + Date.now() + "-" + Math.floor(Math.random() * 100000);
    }


    /**
     * 서버 응답 전까지 임시 메시지에 표시할 현재 시간을 생성한다.
     * 형식: YYYY.MM.DD HH:mm:ss
     */
    function createNowDateTimeText() {
        const now = new Date();

        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        const day = String(now.getDate()).padStart(2, "0");
        const hour = String(now.getHours()).padStart(2, "0");
        const minute = String(now.getMinutes()).padStart(2, "0");
        const second = String(now.getSeconds()).padStart(2, "0");

        return year + "." + month + "." + day + " " + hour + ":" + minute + ":" + second;
    }
    
    
    async function markAsRead(roomId, messageId) {
        try {
            await fetch("/user-service/api/chat/rooms/" + roomId + "/read", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    messageId: messageId
                })
            });
        } catch (error) {
            console.error("읽음 처리 실패", error);
        }
    }
    
    function requestMarkAsRead(roomId, messageId) {
        if (!messageId) return;

        // 이미 더 최신 메시지까지 읽음 요청했다면 중복 방지
        if (messageId <= lastRequestedReadMessageId) {
            return;
        }

        lastRequestedReadMessageId = messageId;

        clearTimeout(readTimer);
        readTimer = setTimeout(function () {
            sendReadEvent(roomId, messageId);
        }, 300);
    }

    function sendReadEvent(roomId, messageId) {
        if (stompClient && stompClient.connected) {
            stompClient.send("/app/chat/read", {}, JSON.stringify({
                roomId: Number(roomId),
                lastReadMessageId: messageId
            }));
        } else {
            // WebSocket 연결 전이면 REST 방식으로 fallback
            markAsRead(roomId, messageId);
        }
    }

    function updateReadStatus(lastReadMessageId) {
        const myMessages = document.querySelectorAll(".message-item.mine");

        myMessages.forEach(function (item) {
            const messageId = Number(item.dataset.messageId);

            if (messageId <= lastReadMessageId) {
                const readEl = item.querySelector(".message-read");

                if (readEl) {
                    readEl.dataset.read = "true"; // 실제 읽음 상태는 data-read에 저장한다.
                    readEl.textContent = "읽음";
                }
            }
        });

        rebuildReadStatus(); // 읽음 상태 변경 후 마지막 메시지에만 읽음이 보이도록 다시 정리한다.
    }
    
    
    //입력값 보존 함수
    function saveDraftMessage() {
        const textarea = document.getElementById("messageContent");

        if (!textarea) {
            return;
        }

        draftMessageContent = textarea.value; // 현재 입력 중인 메시지를 임시 저장한다.
    }
    
    //입력값 복원 함수
    function restoreDraftMessage() {
        const textarea = document.getElementById("messageContent");

        if (!textarea) {
            return;
        }

        if (draftMessageContent) {
            textarea.value = draftMessageContent; // 재연결 후 입력 중이던 메시지를 복원한다.
        }
    }
    
    //연결 상태 함수
    function updateConnectStatus(status) {
	    const connectStatus = document.getElementById("connectStatus");
	
	    if (!connectStatus) {
	        return;
	    }
	
	    connectStatus.className = "connect-status " + status;
	
	    if (status === "connecting") {
	        connectStatus.textContent = "연결 중";
	    }
	
	    if (status === "connected") {
	        connectStatus.textContent = "연결됨";
	    }
	
	    if (status === "disconnected") {
	        connectStatus.textContent = "연결 끊김 - 재연결 중";
	    }
	}
    
    //입력창/전송 버튼 제어 함수
    function updateInputAvailable() {
	    const textarea = document.getElementById("messageContent");
	    const sendBtn = document.getElementById("sendBtn");
	
	    if (!textarea || !sendBtn) {
	        return;
	    }
	
	    const isConnected = stompClient && stompClient.connected;
	    const hasText = textarea.value.trim() !== "";
	
	    if (!isConnected) {
	        textarea.disabled = false;
	        textarea.placeholder = "연결 대기 중입니다. 메시지는 전송 대기열에 저장됩니다.";
	        sendBtn.disabled = textarea.value.trim() === ""; // 연결이 끊겨도 queue 저장을 위해 전송 버튼은 허용한다.
	        return;
	    }
	
	    textarea.disabled = false;
	    textarea.placeholder = "메시지를 입력하세요.";
	
	    restoreDraftMessage(); // 재연결 성공 후 기존 입력값을 복원한다.
	
	    sendBtn.disabled = textarea.value.trim() === ""; // 복원된 입력값 기준으로 전송 버튼 상태를 계산한다.
	}

    
    function scrollToBottom() {
        const container = document.getElementById("messageArea");
        container.scrollTop = container.scrollHeight;
    }

    
    function escapeHtml(str) {
        if (!str) return "";
        return String(str)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }
    
    //뒤로가기 함수
    function goBack() {
        if (document.referrer) {
            history.back();
        } else {
            location.href = "/user-service/chat/rooms";
        }
    }
    
    
    document.addEventListener("visibilitychange", function () {
        if (document.visibilityState !== "visible") {
            return;
        }

        const otherMessages = document.querySelectorAll(".message-item.other");
        if (!otherMessages || otherMessages.length === 0) {
            return;
        }

        const lastOtherMessageEl = otherMessages[otherMessages.length - 1];
        const lastMessageId = Number(lastOtherMessageEl.dataset.messageId);

        requestMarkAsRead(roomId, lastMessageId);
    });
    
    window.addEventListener("beforeunload", function () {
        isPageLeaving = true; // 페이지를 벗어날 때는 자동 재연결을 막는다.

        clearReconnectTimer();

        if (messageSubscription) {
            messageSubscription.unsubscribe();
            messageSubscription = null;
        }

        if (readSubscription) {
            readSubscription.unsubscribe();
            readSubscription = null;
        }

        if (stompClient && stompClient.connected) {
            stompClient.disconnect(); // 페이지 이탈 시 WebSocket 연결을 정상 종료한다.
        }
    });
</script>
