<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout_main :: layout(~{::title},~{::link},~{::style},~{::script},~{::section})}">

<head>
  <title>자주 묻는 질문</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style type="text/css">
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #f8fafc; color: #1e293b; }

    .faq-hero {
      background: linear-gradient(135deg, #1e40af 0%, #2563eb 50%, #3b82f6 100%);
      padding: 56px 24px; text-align: center; color: white;
    }
    .faq-hero h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; }
    .faq-hero p  { font-size: 15px; color: rgba(255,255,255,0.8); margin-bottom: 28px; }
    .faq-hero .inquiry-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px; background: white; color: #2563eb;
      border-radius: 8px; font-size: 14px; font-weight: 600;
      text-decoration: none; transition: all 0.2s;
    }
    .faq-hero .inquiry-btn:hover { background: #eff6ff; transform: translateY(-1px); }

    .faq-wrap { max-width: 900px; margin: 40px auto; padding: 0 24px 60px; }

    .search-box {
      display: flex; align-items: center;
      background: white; border: 1.5px solid #e2e8f0;
      border-radius: 10px; overflow: hidden;
      margin-bottom: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .search-box input {
      flex: 1; padding: 14px 20px; border: none; outline: none;
      font-size: 15px; font-family: inherit; background: transparent;
    }
    .search-box button {
      padding: 14px 20px; background: #2563eb; border: none;
      color: white; cursor: pointer; font-size: 16px; transition: background 0.2s;
    }
    .search-box button:hover { background: #1d4ed8; }

    .category-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
    .cat-btn {
      padding: 8px 20px; border-radius: 20px; border: 1.5px solid #e2e8f0;
      background: white; font-size: 14px; font-weight: 500; color: #64748b;
      cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .cat-btn:hover { border-color: #2563eb; color: #2563eb; }
    .cat-btn.active { background: #2563eb; border-color: #2563eb; color: white; }

    .faq-table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
    .faq-table thead tr { background: #f8fafc; border-bottom: 1.5px solid #e2e8f0; }
    .faq-table th { padding: 14px 16px; font-size: 13px; font-weight: 600; color: #64748b; text-align: left; }
    .faq-table th.center { text-align: center; }
    .faq-table td { padding: 16px; font-size: 14px; color: #374151; border-bottom: 1px solid #f1f5f9; }
    .faq-table td.center { text-align: center; }
    .faq-table tbody tr { cursor: pointer; transition: background 0.15s; }
    .faq-table tbody tr:hover { background: #eff6ff; }
    .faq-table tbody tr:last-child td { border-bottom: none; }

    .answer-row { display: none; }
    .answer-row.open { display: table-row; }
    .answer-row td { background: #f0f7ff; padding: 16px 20px 20px 56px; border-bottom: 1px solid #e2e8f0; }
    .answer-content { font-size: 14px; color: #374151; line-height: 1.8; }

    .cat-badge {
      display: inline-block; padding: 4px 10px; border-radius: 4px;
      font-size: 12px; font-weight: 600; white-space: nowrap;
    }
    .cat-badge.general { background: #dbeafe; color: #1d4ed8; }
    .cat-badge.company { background: #d1fae5; color: #065f46; }
    .cat-badge.member  { background: #fef3c7; color: #92400e; }
    .cat-badge.job     { background: #ede9fe; color: #5b21b6; }
    .cat-badge.etc     { background: #f1f5f9; color: #475569; }

    .faq-title { color: #1e293b; }
    .view-count { font-size: 13px; color: #94a3b8; }
    .toggle-icon { font-size: 16px; color: #94a3b8; transition: transform 0.2s; }
    .open-icon { transform: rotate(180deg); color: #2563eb; }
    .total-count { display: block; text-align: center; font-size: 14px; color: #64748b; padding: 16px 0; }

    @media (max-width: 768px) {
      .faq-table { display: block; overflow-x: auto; }
      .category-tabs { gap: 6px; }
      .cat-btn { padding: 6px 14px; font-size: 13px; }
    }
  </style>

  <script type="text/javascript">
    document.addEventListener('DOMContentLoaded', function () {

      const faqs = [
        { id:1,  cat:'general', title:'회원가입은 어떻게 하나요?',                  answer:'오른쪽 상단 회원가입 버튼을 클릭하여 이메일, 비밀번호, 이름, 전화번호를 입력하면 가입할 수 있습니다. 구직자와 기업회원으로 구분하여 가입이 가능합니다.' },
        { id:2,  cat:'general', title:'비밀번호를 잊어버렸어요.',                      answer:'로그인 페이지에서 "비밀번호 찾기"를 클릭하고 가입 시 등록한 이메일을 입력하면 비밀번호 재설정 메일을 보내드립니다.' },
        { id:3,  cat:'general', title:'회원 탈퇴는 어떻게 하나요?',                  answer:'마이페이지 > 계정 설정 > 회원 탈퇴에서 탈퇴하실 수 있습니다. 탈퇴 후 30일간 데이터가 보관되며 이후 완전 삭제됩니다.' },
        { id:4,  cat:'company', title:'기업 회원가입 후 승인이 필요한가요?',           answer:'네, 기업 회원가입 후 관리자의 사업자번호 확인 절차를 거칩니다. 보통 1~2 영업일 내에 승인 결과를 이메일로 안내드립니다.' },
        { id:5,  cat:'company', title:'채용공고는 어떻게 등록하나요?',                answer:'기업 서비스 로그인 후 "공고 등록" 버튼을 클릭하여 직무, 지역, 급여 등 정보를 입력하면 공고를 등록할 수 있습니다.' },
        { id:6,  cat:'company', title:'지원자 이력서는 어디서 확인하나요?',           answer:'기업 대시보드 > 지원 관리에서 공고별 지원자 목록과 이력서를 확인하실 수 있습니다.' },
        { id:7,  cat:'member',  title:'이력서는 몇 개까지 등록할 수 있나요?',           answer:'최대 5개의 이력서를 등록할 수 있으며, 그 중 1개를 대표 이력서로 설정할 수 있습니다.' },
        { id:8,  cat:'member',  title:'스크랩한 공고는 어디서 확인하나요?',             answer:'마이페이지 > 관심 공고에서 스크랩한 채용공고 목록을 확인하실 수 있습니다.' },
        { id:9,  cat:'job',     title:'채용공고 검색 필터는 어떻게 사용하나요?',        answer:'채용정보 페이지에서 직무, 지역, 경력, 급여 등 다양한 필터를 조합하여 원하는 공고를 찾을 수 있습니다.' },
        { id:10, cat:'job',     title:'공고 마감일이 지난 후에도 지원이 가능한가요?',    answer:'마감일이 지난 공고는 지원이 불가능합니다. 상시채용 공고의 경우 별도 마감 없이 지원 가능합니다.' },
        { id:11, cat:'etc',     title:'서비스 이용 중 오류가 발생했어요.',              answer:'1:1 문의 또는 고객센터(1234-5678)로 연락해 주시면 빠르게 도움드리겠습니다. 오류 화면 캡처를 함께 보내주시면 더욱 신속한 처리가 가능합니다.' },
        { id:12, cat:'etc',     title:'광고 및 제휴 문의는 어디로 하나요?',            answer:'하단 푸터의 "광고문의" 링크를 통해 문의하시거나 ad@jobfinder.com으로 이메일을 보내주세요.' },
      ];

      const catLabels = { general:'일반문의', company:'기업회원', member:'구직자', job:'채용공고', etc:'기타' };
      const catClass  = { general:'general',  company:'company',  member:'member',  job:'job',     etc:'etc' };

      let currentCat = 'all';
      let openId     = null;

      function getFiltered() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        return faqs.filter(f =>
          (currentCat === 'all' || f.cat === currentCat) &&
          (f.title.toLowerCase().includes(q) || f.answer.toLowerCase().includes(q))
        );
      }

      function render() {
        const filtered = getFiltered();
        const tbody = document.getElementById('faqTableBody');
        tbody.innerHTML = '';

        filtered.forEach((f, i) => {
          const isOpen = openId === f.id;

          const qRow = document.createElement('tr');
          qRow.innerHTML = `
            <td class="center" style="width:40px;">${i + 1}</td>
            <td class="center" style="width:90px;"><span class="cat-badge ${catClass[f.cat]}">${catLabels[f.cat]}</span></td>
            <td class="faq-title">Q. ${f.title}</td>
            <td class="center" style="width:40px;"><span class="toggle-icon ${isOpen ? 'open-icon' : ''}">▼</span></td>
          `;
          qRow.onclick = () => { openId = isOpen ? null : f.id; render(); };
          tbody.appendChild(qRow);

          const aRow = document.createElement('tr');
          aRow.className = `answer-row ${isOpen ? 'open' : ''}`;
          aRow.innerHTML = `<td colspan="5"><div class="answer-content">💡 ${f.answer}</div></td>`;
          tbody.appendChild(aRow);
        });

        document.getElementById('footerCount').textContent = `많이 하는 ${filtered.length}개의 질문`;
      }

      document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          currentCat = this.dataset.cat;
          openId     = null;
          render();
        });
      });

      document.getElementById('searchInput').addEventListener('input', () => { openId = null; render(); });
      document.getElementById('searchBtn').addEventListener('click', () => { openId = null; render(); });

      render();
    });
  </script>
</head>

<body>
<section>

  <div class="faq-hero">
    <h1>자주 묻는 질문 (FAQ)</h1>
    <p>궁금하신 사항을 빠르게 찾아보세요.<br>해결되지 않으면 1:1 문의를 이용해 주세요.</p>
    <a th:href="@{/inquiry}" class="inquiry-btn">✉ 1:1 문의 바로가기</a>
  </div>

  <div class="faq-wrap">

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="궁금한 내용을 검색해보세요...">
      <button id="searchBtn">🔍</button>
    </div>

    <div class="category-tabs">
      <button class="cat-btn active" data-cat="all">전체</button>
      <button class="cat-btn" data-cat="general">일반문의</button>
      <button class="cat-btn" data-cat="company">기업회원</button>
      <button class="cat-btn" data-cat="member">구직자</button>
      <button class="cat-btn" data-cat="job">채용공고</button>
      <button class="cat-btn" data-cat="etc">기타</button>
    </div>

    <table class="faq-table">
      <thead>
        <tr>
          <th class="center" style="width:40px;">번호</th>
          <th class="center" style="width:90px;">분류</th>
          <th>내용</th>
          <th class="center" style="width:40px;"></th>
        </tr>
      </thead>
      <tbody id="faqTableBody"></tbody>
    </table>

    <span class="total-count" id="footerCount"></span>

  </div>

</section>
</body>
</html>
